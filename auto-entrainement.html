<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MIB — Auto-entraînement SSIAP</title>
<meta name="theme-color" content="#1d4ed8">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="supabase.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Syne:wght@700;800;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;font-family:'Inter',sans-serif;background:#eef2ff;color:#111827;}
.bg-wrap{position:fixed;inset:0;z-index:0;background:linear-gradient(160deg,#eef2ff 0%,#f5f7ff 100%);}
.card{background:#fff;border-radius:20px;border:1px solid rgba(0,0,0,.06);box-shadow:0 4px 20px rgba(0,0,0,.08);}
.btn{padding:12px 24px;border-radius:12px;border:none;font-weight:700;font-size:.88rem;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);}
.btn:active{transform:translateY(0);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-blue{background:linear-gradient(135deg,#3b82f6,#1d4ed8);color:#fff;box-shadow:0 4px 14px rgba(37,99,235,.35);}
.btn-green{background:linear-gradient(135deg,#10b981,#059669);color:#fff;box-shadow:0 4px 14px rgba(16,185,129,.35);}
.btn-gray{background:#f3f4f6;color:#374151;border:1px solid #e5e7eb;}
.btn-gray:hover{background:#e5e7eb;}
.choice-btn{width:100%;padding:14px 18px;border-radius:12px;border:2px solid #e5e7eb;background:#fff;
  font-size:.88rem;font-weight:500;text-align:left;cursor:pointer;transition:all .2s;color:#111827;}
.choice-btn:hover:not(:disabled){border-color:#3b82f6;background:#eff6ff;}
.choice-btn.correct{border-color:#10b981!important;background:#f0fdf4!important;color:#065f46!important;font-weight:700;}
.choice-btn.wrong{border-color:#ef4444!important;background:#fff1f2!important;color:#b91c1c!important;}
.choice-btn.show-correct{border-color:#10b981!important;background:#f0fdf4!important;}
.prog-bar{height:6px;border-radius:999px;background:#e5e7eb;overflow:hidden;}
.prog-fill{height:100%;border-radius:999px;background:linear-gradient(90deg,#3b82f6,#1d4ed8);transition:width .4s;}
.badge{display:inline-block;padding:3px 10px;border-radius:999px;font-size:.7rem;font-weight:700;}
.b-blue{background:#eff6ff;color:#1d4ed8;border:1px solid #bfdbfe;}
.b-green{background:#f0fdf4;color:#065f46;border:1px solid #bbf7d0;}
.b-orange{background:#fff7ed;color:#c2410c;border:1px solid #fed7aa;}
.b-red{background:#fff1f2;color:#b91c1c;border:1px solid #fecdd3;}
.b-gray{background:#f9fafb;color:#6b7280;border:1px solid #e5e7eb;}
.logo-t{font-family:'Syne',sans-serif;font-weight:900;}
.spin{width:20px;height:20px;border:2.5px solid rgba(37,99,235,.2);border-top-color:#3b82f6;border-radius:50%;animation:sp .6s linear infinite;display:inline-block;}
@keyframes sp{to{transform:rotate(360deg)}}
.hidden{display:none!important;}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.fade-up{animation:fadeUp .3s ease forwards;}
/* RING SCORE */
.score-ring{position:relative;width:130px;height:130px;}
.score-ring svg{transform:rotate(-90deg);}
.score-ring .ring-bg{fill:none;stroke:#e5e7eb;stroke-width:10;}
.score-ring .ring-fill{fill:none;stroke-width:10;stroke-linecap:round;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
</style>
</head>
<body>
<div class="bg-wrap"></div>

<div class="relative z-10 min-h-screen flex flex-col">

  <!-- TOPBAR -->
  <div style="background:rgba(255,255,255,.9);backdrop-filter:blur(12px);border-bottom:1px solid rgba(0,0,0,.06);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;">
    <div class="flex items-center gap-3">
      <button onclick="goBack()" style="background:none;border:none;cursor:pointer;font-size:1.2rem;color:#6b7280;">←</button>
      <span class="logo-t" style="font-size:.95rem;color:#111827;">Auto-entraînement</span>
      <span id="top-niveau" class="badge b-blue hidden">—</span>
    </div>
    <div id="top-score" class="hidden" style="display:flex;gap:12px;font-size:.8rem;font-weight:600;">
      <span style="color:#059669;" id="score-ok">✅ 0</span>
      <span style="color:#ef4444;" id="score-ko">❌ 0</span>
    </div>
  </div>

  <!-- ══ ACCUEIL ══ -->
  <div id="scr-home" class="flex-1 p-5" style="max-width:560px;width:100%;margin:0 auto;">
    <div style="margin-bottom:24px;padding-top:8px;">
      <h1 class="logo-t" style="font-size:1.5rem;">Quiz SSIAP 🎯</h1>
      <p style="font-size:.85rem;color:#6b7280;margin-top:4px;">Entraîne-toi à ton rythme</p>
    </div>

    <!-- Niveau -->
    <div class="card p-5 mb-4">
      <div style="font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#6b7280;margin-bottom:12px;">Niveau SSIAP</div>
      <div style="display:flex;gap:8px;">
        <button onclick="selectNiveau('SSIAP1')" id="btn-n1" class="btn btn-gray" style="flex:1;padding:10px;font-size:.82rem;">SSIAP 1</button>
        <button onclick="selectNiveau('SSIAP2')" id="btn-n2" class="btn btn-gray" style="flex:1;padding:10px;font-size:.82rem;">SSIAP 2</button>
        <button onclick="selectNiveau('SSIAP3')" id="btn-n3" class="btn btn-gray" style="flex:1;padding:10px;font-size:.82rem;">SSIAP 3</button>
      </div>
    </div>

    <!-- Nb questions -->
    <div class="card p-5 mb-4">
      <div style="font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#6b7280;margin-bottom:12px;">Nombre de questions</div>
      <div style="display:flex;gap:8px;">
        <button onclick="selectNb(10)" id="btn-nb10" class="btn btn-gray" style="flex:1;padding:10px;font-size:.82rem;">10</button>
        <button onclick="selectNb(20)" id="btn-nb20" class="btn btn-blue" style="flex:1;padding:10px;font-size:.82rem;">20</button>
        <button onclick="selectNb(30)" id="btn-nb30" class="btn btn-gray" style="flex:1;padding:10px;font-size:.82rem;">30</button>
        <button onclick="selectNb(50)" id="btn-nb50" class="btn btn-gray" style="flex:1;padding:10px;font-size:.82rem;">50</button>
      </div>
    </div>

    <!-- Thème -->
    <div class="card p-5 mb-5">
      <div style="font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#6b7280;margin-bottom:12px;">Thème</div>
      <select id="sel-theme" style="width:100%;padding:10px 12px;border-radius:10px;border:1.5px solid #e5e7eb;font-size:.85rem;color:#111827;background:#fff;outline:none;">
        <option value="">Tous les thèmes</option>
      </select>
    </div>

    <div id="home-err" class="hidden" style="background:#fff1f2;border:1.5px solid #fecdd3;border-radius:10px;padding:10px 14px;font-size:.82rem;color:#b91c1c;margin-bottom:12px;"></div>

    <button onclick="startSession()" class="btn btn-blue" style="width:100%;padding:15px;font-size:1rem;" id="btn-start">
      🚀 Commencer l'entraînement
    </button>

    <!-- Historique -->
    <div id="historique-wrap" class="mt-6 hidden">
      <div style="font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#6b7280;margin-bottom:10px;">Dernières sessions</div>
      <div id="historique-list"></div>
    </div>
  </div>

  <!-- ══ QUESTION ══ -->
  <div id="scr-question" class="flex-1 p-5 hidden" style="max-width:560px;width:100%;margin:0 auto;">

    <!-- Progress -->
    <div class="flex items-center gap-3 mb-5">
      <div class="prog-bar flex-1"><div class="prog-fill" id="prog" style="width:0%;"></div></div>
      <span style="font-size:.78rem;font-weight:600;color:#6b7280;" id="q-counter">1/20</span>
    </div>

    <div class="card p-5 mb-4 fade-up" id="question-card">
      <!-- Thème + type -->
      <div style="display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;" id="q-meta"></div>
      <!-- Énoncé -->
      <p style="font-size:.95rem;font-weight:600;line-height:1.6;margin-bottom:20px;" id="q-enonce">—</p>
      <!-- Choix -->
      <div id="q-choices" class="space-y-3"></div>
    </div>

    <!-- Explication -->
    <div id="q-explication" class="hidden card p-4 mb-4" style="border-left:4px solid #3b82f6;">
      <div style="font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#3b82f6;margin-bottom:6px;">💡 Explication</div>
      <p style="font-size:.85rem;line-height:1.6;" id="q-expl-text">—</p>
    </div>

    <button onclick="nextQuestion()" class="btn btn-blue hidden" style="width:100%;padding:14px;" id="btn-next">
      Question suivante →
    </button>
    <button onclick="showResults()" class="btn btn-green hidden" style="width:100%;padding:14px;" id="btn-finish">
      Voir mes résultats ✅
    </button>
  </div>

  <!-- ══ RÉSULTATS ══ -->
  <div id="scr-result" class="flex-1 p-5 hidden" style="max-width:560px;width:100%;margin:0 auto;">
    <div class="card p-6 mb-5 text-center fade-up">
      <!-- Ring -->
      <div class="score-ring mx-auto mb-4">
        <svg viewBox="0 0 130 130" width="130" height="130">
          <circle class="ring-bg" cx="65" cy="65" r="58"/>
          <circle class="ring-fill" id="ring-fill" cx="65" cy="65" r="58" stroke="#3b82f6"
            style="stroke-dasharray:0 365;stroke-dashoffset:0;"/>
        </svg>
        <div class="score-center">
          <div class="logo-t" style="font-size:1.8rem;" id="res-pct">—%</div>
          <div style="font-size:.72rem;color:#6b7280;">Score</div>
        </div>
      </div>
      <div id="res-emoji" style="font-size:2rem;margin-bottom:8px;"></div>
      <div class="logo-t" style="font-size:1.1rem;margin-bottom:4px;" id="res-msg">—</div>
      <div style="font-size:.82rem;color:#6b7280;" id="res-detail">—</div>
      <div style="display:flex;justify-content:center;gap:20px;margin-top:16px;">
        <div><div class="logo-t" style="font-size:1.4rem;color:#059669;" id="res-ok">—</div><div style="font-size:.68rem;color:#6b7280;">Correctes</div></div>
        <div><div class="logo-t" style="font-size:1.4rem;color:#ef4444;" id="res-ko">—</div><div style="font-size:.68rem;color:#6b7280;">Incorrectes</div></div>
        <div><div class="logo-t" style="font-size:1.4rem;color:#6b7280;" id="res-time">—</div><div style="font-size:.68rem;color:#6b7280;">Durée</div></div>
      </div>
    </div>

    <!-- Erreurs -->
    <div id="erreurs-wrap" class="hidden mb-5">
      <div style="font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#6b7280;margin-bottom:10px;">❌ Questions ratées</div>
      <div id="erreurs-list" class="space-y-3"></div>
    </div>

    <div style="display:flex;gap:10px;">
      <button onclick="restartSame()" class="btn btn-blue flex-1">🔄 Recommencer</button>
      <button onclick="goHome()" class="btn btn-gray flex-1">🏠 Accueil</button>
    </div>
  </div>

</div>

<!-- CONFETTI -->
<div id="confetti-wrap" style="position:fixed;inset:0;pointer-events:none;z-index:999;overflow:hidden;"></div>
<style>@keyframes cf{to{transform:translateY(110vh) rotate(720deg);opacity:0}}</style>

<script>
// ============================================================
// ÉTAT
// ============================================================
const params = new URLSearchParams(window.location.search);
let STAGIAIRE_ID = params.get('stagiaire') || null;
let CENTER_ID    = params.get('center')    || null;
let SESSION_ID   = params.get('session')   || null;
let NIVEAU_PARAM = params.get('niveau')    || null;

let selectedNiveau = NIVEAU_PARAM || 'SSIAP1';
let selectedNb     = 20;
let selectedTheme  = '';
let questions      = [];
let currentIdx     = 0;
let correctCount   = 0;
let wrongCount     = 0;
let sessionId      = null;
let startTime      = null;
let answered       = false;
let lastConfig     = {};

// ============================================================
// INIT
// ============================================================
window.addEventListener('DOMContentLoaded', async () => {
  // Si stagiaire connecté, pré-régler son niveau
  if (!STAGIAIRE_ID) {
    const s = SESSION.load('stagiaire');
    if (s) { STAGIAIRE_ID = s.stagiaire_id; CENTER_ID = s.center_id; NIVEAU_PARAM = s.stagiaire_niveau; }
  }
  if (NIVEAU_PARAM) {
    selectedNiveau = NIVEAU_PARAM;
    document.getElementById('top-niveau').textContent = selectedNiveau;
    document.getElementById('top-niveau').classList.remove('hidden');
  }
  updateNiveauUI();
  updateNbUI();
  await loadThemes();
  await loadHistorique();
});

async function loadThemes() {
  try {
    const { data } = await supabase.from('entrainement_questions')
      .select('theme').eq('niveau', selectedNiveau).not('theme','is',null);
    const themes = [...new Set((data||[]).map(q=>q.theme).filter(Boolean))].sort();
    const sel = document.getElementById('sel-theme');
    sel.innerHTML = '<option value="">Tous les thèmes</option>';
    themes.forEach(t => {
      const opt = document.createElement('option');
      opt.value = t; opt.textContent = t;
      sel.appendChild(opt);
    });
  } catch(e) { console.error(e); }
}

async function loadHistorique() {
  if (!STAGIAIRE_ID) return;
  try {
    const { data } = await supabase.from('entrainement_sessions')
      .select('*').eq('stagiaire_id', STAGIAIRE_ID)
      .order('created_at',{ascending:false}).limit(5);
    if (!data || !data.length) return;
    const wrap = document.getElementById('historique-wrap');
    const list = document.getElementById('historique-list');
    wrap.classList.remove('hidden');
    list.innerHTML = data.map(s => {
      const pct = s.total ? Math.round(s.score/s.total*100) : 0;
      const cls = pct >= 70 ? 'b-green' : pct >= 50 ? 'b-orange' : 'b-red';
      return `<div style="display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-radius:10px;background:#f9fafb;margin-bottom:6px;">
        <div>
          <span class="badge b-blue" style="margin-right:6px;">${s.niveau||'—'}</span>
          <span style="font-size:.82rem;color:#6b7280;">${s.total} questions · ${new Date(s.created_at).toLocaleDateString('fr-FR')}</span>
        </div>
        <span class="badge ${cls}">${pct}%</span>
      </div>`;
    }).join('');
  } catch(e) { console.error(e); }
}

// ============================================================
// SÉLECTIONS ACCUEIL
// ============================================================
function selectNiveau(n) {
  selectedNiveau = n;
  updateNiveauUI();
  document.getElementById('top-niveau').textContent = n;
  document.getElementById('top-niveau').classList.remove('hidden');
  loadThemes();
}

function updateNiveauUI() {
  ['SSIAP1','SSIAP2','SSIAP3'].forEach(n => {
    const btn = document.getElementById('btn-n' + n.slice(-1));
    if (!btn) return;
    btn.className = 'btn ' + (n === selectedNiveau ? 'btn-blue' : 'btn-gray');
    btn.style.flex = '1'; btn.style.padding = '10px'; btn.style.fontSize = '.82rem';
  });
}

function selectNb(n) {
  selectedNb = n;
  updateNbUI();
}

function updateNbUI() {
  [10,20,30,50].forEach(n => {
    const btn = document.getElementById('btn-nb' + n);
    if (!btn) return;
    btn.className = 'btn ' + (n === selectedNb ? 'btn-blue' : 'btn-gray');
    btn.style.flex = '1'; btn.style.padding = '10px'; btn.style.fontSize = '.82rem';
  });
}

// ============================================================
// DÉMARRER SESSION
// ============================================================
async function startSession() {
  const errEl = document.getElementById('home-err');
  errEl.classList.add('hidden');
  const btn = document.getElementById('btn-start');
  btn.disabled = true; btn.innerHTML = '<span class="spin"></span> Chargement...';
  selectedTheme = document.getElementById('sel-theme').value;
  lastConfig = { niveau: selectedNiveau, nb: selectedNb, theme: selectedTheme };

  try {
    // Charger questions
    let query = supabase.from('entrainement_questions')
      .select('*').eq('niveau', selectedNiveau).eq('actif', true);
    if (selectedTheme) query = query.eq('theme', selectedTheme);

    const { data, error } = await query;
    if (error) throw error;
    if (!data || data.length < 2) throw new Error('Pas assez de questions disponibles pour ce niveau/thème.');

    // Mélanger et limiter
    questions = shuffle(data).slice(0, Math.min(selectedNb, data.length));
    currentIdx = 0; correctCount = 0; wrongCount = 0; answered = false;
    startTime = Date.now();

    // Créer session en base si stagiaire connecté
    if (STAGIAIRE_ID) {
      const { data: sess } = await supabase.from('entrainement_sessions').insert({
        stagiaire_id: STAGIAIRE_ID,
        center_id: CENTER_ID,
        session_formation_id: SESSION_ID || null,
        niveau: selectedNiveau,
        total: questions.length,
        score: 0,
        statut: 'en_cours'
      }).select().single();
      sessionId = sess?.id || null;
    }

    updateTopScore();
    showScreen('scr-question');
    renderQuestion();
  } catch(e) {
    errEl.textContent = '❌ ' + e.message;
    errEl.classList.remove('hidden');
  } finally {
    btn.disabled = false; btn.textContent = '🚀 Commencer l\'entraînement';
  }
}

// ============================================================
// QUESTION
// ============================================================
function renderQuestion() {
  const q = questions[currentIdx];
  if (!q) { showResults(); return; }
  answered = false;

  // Progress
  const pct = Math.round((currentIdx / questions.length) * 100);
  document.getElementById('prog').style.width = pct + '%';
  document.getElementById('q-counter').textContent = (currentIdx + 1) + '/' + questions.length;

  // Meta
  const meta = document.getElementById('q-meta');
  meta.innerHTML = '';
  if (q.theme) { const b = document.createElement('span'); b.className='badge b-blue'; b.textContent=q.theme; meta.appendChild(b); }
  if (q.difficulte) {
    const cls = q.difficulte==='facile'?'b-green':q.difficulte==='difficile'?'b-red':'b-orange';
    const b = document.createElement('span'); b.className='badge '+cls; b.textContent=q.difficulte; meta.appendChild(b);
  }

  // Énoncé
  document.getElementById('q-enonce').textContent = q.question || q.enonce || '—';

  // Choix
  const choicesEl = document.getElementById('q-choices');
  choicesEl.innerHTML = '';
  document.getElementById('q-explication').classList.add('hidden');
  document.getElementById('btn-next').classList.add('hidden');
  document.getElementById('btn-finish').classList.add('hidden');

  const choices = buildChoices(q);
  choices.forEach((ch, i) => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.textContent = ch.text;
    btn.onclick = () => selectAnswer(btn, ch.correct, q, i);
    choicesEl.appendChild(btn);
  });

  // Animer
  document.getElementById('question-card').classList.remove('fade-up');
  void document.getElementById('question-card').offsetWidth;
  document.getElementById('question-card').classList.add('fade-up');
}

function buildChoices(q) {
  // Support plusieurs formats
  if (q.choices && Array.isArray(q.choices)) {
    return q.choices;
  }
  if (q.options && Array.isArray(q.options)) {
    return q.options.map((o, i) => ({
      text: typeof o === 'string' ? o : o.text,
      correct: typeof o === 'object' ? o.correct : (String(i) === String(q.bonne_reponse) || o === q.bonne_reponse)
    }));
  }
  // Format colonnes: option_a, option_b, option_c, option_d + bonne_reponse
  const opts = [];
  ['a','b','c','d'].forEach(l => {
    if (q['option_' + l]) {
      opts.push({ text: q['option_' + l], correct: q.bonne_reponse === l || q.bonne_reponse === q['option_'+l] });
    }
  });
  if (opts.length) return shuffle(opts);
  return [{ text: 'Erreur: format de question non reconnu', correct: true }];
}

function selectAnswer(btn, isCorrect, q, idx) {
  if (answered) return;
  answered = true;

  const allBtns = document.querySelectorAll('.choice-btn');
  allBtns.forEach(b => { b.disabled = true; });

  if (isCorrect) {
    btn.classList.add('correct');
    correctCount++;
  } else {
    btn.classList.add('wrong');
    // Montrer la bonne réponse
    allBtns.forEach(b => {
      const choices = buildChoices(q);
      const txt = b.textContent;
      const ch = choices.find(c => c.text === txt);
      if (ch?.correct) b.classList.add('show-correct');
    });
    wrongCount++;
  }

  updateTopScore();

  // Enregistrer réponse en base
  if (sessionId) {
    supabase.from('entrainement_reponses').insert({
      session_id: sessionId,
      question_id: q.id,
      est_correcte: isCorrect
    }).then(() => {});
  }

  // Explication
  const expl = q.explication || q.explanation || q.expl || '';
  if (expl) {
    document.getElementById('q-expl-text').textContent = expl;
    document.getElementById('q-explication').classList.remove('hidden');
  }

  // Bouton suivant/terminer
  if (currentIdx + 1 < questions.length) {
    document.getElementById('btn-next').classList.remove('hidden');
  } else {
    document.getElementById('btn-finish').classList.remove('hidden');
  }
}

function nextQuestion() {
  currentIdx++;
  renderQuestion();
}

function updateTopScore() {
  document.getElementById('top-score').classList.remove('hidden');
  document.getElementById('score-ok').textContent = '✅ ' + correctCount;
  document.getElementById('score-ko').textContent = '❌ ' + wrongCount;
}

// ============================================================
// RÉSULTATS
// ============================================================
async function showResults() {
  const total = questions.length;
  const pct = Math.round((correctCount / total) * 100);
  const duration = Math.round((Date.now() - startTime) / 1000);
  const mins = Math.floor(duration / 60);
  const secs = duration % 60;

  // Mettre à jour session en base
  if (sessionId) {
    await supabase.from('entrainement_sessions').update({
      score: correctCount, statut: 'terminee',
      duree_secondes: duration
    }).eq('id', sessionId);
  }

  showScreen('scr-result');

  document.getElementById('res-pct').textContent = pct + '%';
  document.getElementById('res-ok').textContent = correctCount;
  document.getElementById('res-ko').textContent = wrongCount;
  document.getElementById('res-time').textContent = (mins > 0 ? mins + 'm ' : '') + secs + 's';
  document.getElementById('res-detail').textContent = correctCount + ' / ' + total + ' questions correctes';

  // Message + emoji
  let msg, emoji;
  if (pct >= 90) { msg='Excellent ! 🏆'; emoji='🥇'; }
  else if (pct >= 75) { msg='Très bien ! 👏'; emoji='🎉'; }
  else if (pct >= 60) { msg='Bien, continue !'; emoji='💪'; }
  else if (pct >= 50) { msg='À retravailler'; emoji='📚'; }
  else { msg='Continue l\'entraînement'; emoji='🔄'; }
  document.getElementById('res-msg').textContent = msg;
  document.getElementById('res-emoji').textContent = emoji;

  // Ring animé
  const circumference = 2 * Math.PI * 58; // ~364.4
  const ringFill = document.getElementById('ring-fill');
  const color = pct >= 75 ? '#10b981' : pct >= 50 ? '#f59e0b' : '#ef4444';
  ringFill.style.stroke = color;
  setTimeout(() => {
    ringFill.style.strokeDasharray = (circumference * pct / 100) + ' ' + circumference;
  }, 100);

  // Confetti si bon score
  if (pct >= 75) createConfetti();

  // Erreurs
  const errors = questions.map((q, i) => {
    // Savoir si correct : on stocke par idx
    return null; // On va reconstruire depuis une autre approche
  });
  // Récupérer les mauvaises réponses depuis la session
  if (sessionId) {
    const { data: reps } = await supabase.from('entrainement_reponses')
      .select('question_id, est_correcte').eq('session_id', sessionId).eq('est_correcte', false);
    if (reps && reps.length) {
      const wrongIds = new Set(reps.map(r => r.question_id));
      const wrongQs = questions.filter(q => wrongIds.has(q.id));
      if (wrongQs.length) {
        document.getElementById('erreurs-wrap').classList.remove('hidden');
        document.getElementById('erreurs-list').innerHTML = wrongQs.map(q => {
          const bon = buildChoices(q).find(c => c.correct);
          return `<div class="card p-4">
            <p style="font-size:.85rem;font-weight:600;margin-bottom:8px;">${q.question||q.enonce}</p>
            <p style="font-size:.8rem;color:#059669;"><strong>✅ Bonne réponse :</strong> ${bon?.text||'—'}</p>
            ${q.explication ? `<p style="font-size:.78rem;color:#6b7280;margin-top:6px;">${q.explication}</p>` : ''}
          </div>`;
        }).join('');
      }
    }
  }

  await loadHistorique();
}

// ============================================================
// NAVIGATION
// ============================================================
function restartSame() {
  selectedNiveau = lastConfig.niveau || selectedNiveau;
  selectedNb = lastConfig.nb || selectedNb;
  selectedTheme = lastConfig.theme || '';
  document.getElementById('sel-theme').value = selectedTheme;
  updateNiveauUI(); updateNbUI();
  startSession();
}

function goHome() {
  showScreen('scr-home');
  document.getElementById('top-score').style.display = 'none';
  currentIdx = 0; correctCount = 0; wrongCount = 0;
}

function goBack() {
  const home = !document.getElementById('scr-home').classList.contains('hidden');
  if (home) {
    // Retour vers stagiaire.html ou page précédente
    if (STAGIAIRE_ID) window.location.href = 'stagiaire.html';
    else window.history.back();
  } else {
    if (confirm('Abandonner la session en cours ?')) goHome();
  }
}

function showScreen(id) {
  ['scr-home','scr-question','scr-result'].forEach(s => {
    document.getElementById(s).classList.toggle('hidden', s !== id);
  });
}

// ============================================================
// HELPERS
// ============================================================
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function createConfetti() {
  const colors = ['#6366f1','#3b82f6','#10b981','#f59e0b','#ef4444'];
  for (let i = 0; i < 60; i++) {
    const c = document.createElement('div');
    c.style.cssText = `position:fixed;width:${5+Math.random()*8}px;height:${5+Math.random()*8}px;`
      + `background:${colors[Math.floor(Math.random()*colors.length)]};`
      + `left:${Math.random()*100}vw;top:-10px;z-index:9999;`
      + `border-radius:${Math.random()>.5?'50%':'2px'};`
      + `animation:cf ${2+Math.random()*2}s linear forwards;`;
    document.getElementById('confetti-wrap').appendChild(c);
    setTimeout(() => c.remove(), 4000);
  }
}
