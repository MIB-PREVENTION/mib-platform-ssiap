<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MIB - Auto-entrainement SSIAP</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="supabase.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Syne:wght@700;800;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;font-family:'Inter',sans-serif;background:#eef2ff;color:#111827;}
.card{background:#fff;border-radius:18px;border:1px solid rgba(0,0,0,.06);box-shadow:0 4px 16px rgba(0,0,0,.07);}
.btn{padding:10px 20px;border-radius:11px;border:none;font-weight:700;font-size:.84rem;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-1px);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-blue{background:linear-gradient(135deg,#3b82f6,#1d4ed8);color:#fff;box-shadow:0 4px 12px rgba(37,99,235,.3);}
.btn-green{background:linear-gradient(135deg,#10b981,#059669);color:#fff;box-shadow:0 4px 12px rgba(16,185,129,.3);}
.btn-gray{background:#f3f4f6;color:#374151;border:1px solid #e5e7eb;}
.btn-sm{padding:7px 14px;font-size:.78rem;border-radius:9px;}
.nb-btn{padding:10px 0;border-radius:10px;border:2px solid #e5e7eb;background:#fff;font-weight:700;font-size:.88rem;cursor:pointer;transition:all .2s;color:#374151;text-align:center;}
.nb-btn.sel{border-color:#3b82f6;background:#eff6ff;color:#1d4ed8;}
.nb-btn:hover:not(.sel):not(:disabled){border-color:#93c5fd;background:#f8faff;}
.nb-btn:disabled{opacity:.5;cursor:default;}
.filter-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:9px;cursor:pointer;transition:all .2s;border:1.5px solid #e5e7eb;background:#fff;margin-bottom:5px;}
.filter-item:hover{border-color:#93c5fd;background:#f8faff;}
.filter-item.sel{border-color:#3b82f6;background:#eff6ff;}
.filter-all{border-color:#6366f1!important;background:#f5f3ff;}
.filter-all.sel{border-color:#4f46e5!important;background:#ede9fe;}
.filter-partie{border-color:#059669!important;font-weight:700;}
.filter-partie.sel{background:#f0fdf4!important;border-color:#059669!important;}
.filter-seq{margin-left:16px;font-size:.82rem;}
.filter-theme{margin-left:32px;font-size:.78rem;color:#6b7280;}
.filter-theme.sel{color:#1d4ed8;}
.choice-btn{width:100%;padding:13px 16px;border-radius:11px;border:2px solid #e5e7eb;background:#fff;font-size:.88rem;font-weight:500;text-align:left;cursor:pointer;transition:all .2s;color:#111827;line-height:1.4;}
.choice-btn:hover:not(:disabled){border-color:#3b82f6;background:#eff6ff;}
.choice-btn.correct{border-color:#10b981!important;background:#f0fdf4!important;color:#065f46!important;font-weight:700;}
.choice-btn.wrong{border-color:#ef4444!important;background:#fff1f2!important;color:#b91c1c!important;}
.choice-btn.show-ok{border-color:#10b981!important;background:#f0fdf4!important;}
.badge{display:inline-block;padding:3px 10px;border-radius:999px;font-size:.68rem;font-weight:700;}
.b-blue{background:#eff6ff;color:#1d4ed8;border:1px solid #bfdbfe;}
.b-green{background:#f0fdf4;color:#065f46;border:1px solid #bbf7d0;}
.b-orange{background:#fff7ed;color:#c2410c;border:1px solid #fed7aa;}
.b-red{background:#fff1f2;color:#b91c1c;border:1px solid #fecdd3;}
.prog-bar{height:6px;border-radius:999px;background:#e5e7eb;overflow:hidden;}
.prog-fill{height:100%;border-radius:999px;background:linear-gradient(90deg,#3b82f6,#1d4ed8);transition:width .4s;}
.logo-t{font-family:'Syne',sans-serif;font-weight:900;}
.spin{display:inline-block;width:18px;height:18px;border:2.5px solid rgba(37,99,235,.2);border-top-color:#3b82f6;border-radius:50%;animation:sp .6s linear infinite;}
@keyframes sp{to{transform:rotate(360deg)}}
.hidden{display:none!important;}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.fade-up{animation:fadeUp .3s ease forwards;}
.score-ring{position:relative;width:120px;height:120px;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:#e5e7eb;stroke-width:10;}
.ring-fill{fill:none;stroke-width:10;stroke-linecap:round;transition:stroke-dasharray 1s ease;}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.3);backdrop-filter:blur(6px);z-index:50;display:flex;align-items:flex-end;justify-content:center;}
.modal-box{background:#fff;border-radius:20px 20px 0 0;padding:24px;width:100%;max-width:560px;max-height:85vh;overflow-y:auto;box-shadow:0 -10px 40px rgba(0,0,0,.15);}
.chk{width:16px;height:16px;border-radius:4px;border:2px solid #d1d5db;cursor:pointer;appearance:none;-webkit-appearance:none;transition:all .2s;flex-shrink:0;background:#fff;}
.chk:checked{background:#3b82f6;border-color:#3b82f6;}
@keyframes cf{to{transform:translateY(110vh) rotate(720deg);opacity:0}}
</style>
</head>
<body>
<div style="position:fixed;inset:0;z-index:0;background:linear-gradient(160deg,#eef2ff 0%,#f5f7ff 100%);"></div>
<div class="relative z-10 min-h-screen flex flex-col">

<div style="background:rgba(255,255,255,.92);backdrop-filter:blur(12px);border-bottom:1px solid rgba(0,0,0,.06);padding:11px 18px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;box-shadow:0 2px 10px rgba(0,0,0,.05);">
  <div class="flex items-center gap-3">
    <button onclick="goBack()" style="background:none;border:none;cursor:pointer;font-size:1.1rem;color:#6b7280;padding:4px;">&#8592;</button>
    <span class="logo-t" style="font-size:.92rem;">Auto-entra&#238;nement</span>
  </div>
  <div class="flex items-center gap-2">
    <span id="top-stag" style="font-size:.78rem;font-weight:600;color:#374151;"></span>
    <span id="top-badge" class="badge b-blue hidden"></span>
    <div id="top-score" class="hidden" style="display:flex;gap:10px;font-size:.78rem;font-weight:700;">
      <span style="color:#059669;" id="sc-ok">OK: 0</span>
      <span style="color:#ef4444;" id="sc-ko">KO: 0</span>
    </div>
  </div>
</div>

<!-- ACCUEIL -->
<div id="scr-home" class="flex-1 p-4" style="max-width:560px;width:100%;margin:0 auto;">
  <div style="margin:12px 0 16px;" class="fade-up">
    <div class="logo-t" style="font-size:1.3rem;" id="home-titre">Quiz SSIAP</div>
    <div style="font-size:.82rem;color:#6b7280;margin-top:3px;">Entra&#238;ne-toi &#224; ton rythme</div>
  </div>

  <!-- NIVEAU -->
  <div class="card p-4 mb-3">
    <div style="font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#6b7280;margin-bottom:10px;">Niveau</div>
    <div style="display:flex;gap:8px;">
      <button onclick="selectNiveau('SSIAP1')" id="bn1" class="nb-btn" style="flex:1;">SSIAP 1</button>
      <button onclick="selectNiveau('SSIAP2')" id="bn2" class="nb-btn" style="flex:1;">SSIAP 2</button>
      <button onclick="selectNiveau('SSIAP3')" id="bn3" class="nb-btn" style="flex:1;">SSIAP 3</button>
    </div>
  </div>

  <!-- NB QUESTIONS -->
  <div class="card p-4 mb-3">
    <div style="font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#6b7280;margin-bottom:10px;">Nombre de questions</div>
    <div style="display:grid;grid-template-columns:repeat(6,1fr);gap:6px;">
      <button onclick="selectNb(5)"  id="bnb5"  class="nb-btn">5</button>
      <button onclick="selectNb(10)" id="bnb10" class="nb-btn sel">10</button>
      <button onclick="selectNb(15)" id="bnb15" class="nb-btn">15</button>
      <button onclick="selectNb(20)" id="bnb20" class="nb-btn">20</button>
      <button onclick="selectNb(30)" id="bnb30" class="nb-btn">30</button>
      <button onclick="selectNb(40)" id="bnb40" class="nb-btn">40</button>
    </div>
  </div>

  <!-- FILTRE PARTIE / SEQUENCE / THEME -->
  <div class="card p-4 mb-4">
    <div style="font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#6b7280;margin-bottom:10px;">Parties / S&#233;quences / Th&#232;mes</div>
    <div id="filter-list"></div>
  </div>

  <div id="home-err" class="hidden" style="background:#fff1f2;border:1.5px solid #fecdd3;border-radius:10px;padding:10px 14px;font-size:.82rem;color:#b91c1c;margin-bottom:12px;"></div>

  <button onclick="startSession()" class="btn btn-blue" style="width:100%;padding:14px;font-size:.95rem;margin-bottom:16px;" id="btn-start">
    D&#233;marrer l&#8217;entra&#238;nement
  </button>

  <div id="histo-wrap" class="hidden">
    <div style="font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#6b7280;margin-bottom:10px;">Mon historique</div>
    <div id="histo-list"></div>
  </div>
</div>

<!-- QUESTION -->
<div id="scr-question" class="flex-1 p-4 hidden" style="max-width:560px;width:100%;margin:0 auto;">
  <div class="flex items-center gap-3 mb-4">
    <div class="prog-bar flex-1"><div class="prog-fill" id="prog" style="width:0%;"></div></div>
    <span style="font-size:.75rem;font-weight:700;color:#6b7280;" id="q-counter">1/10</span>
  </div>
  <div class="card p-5 mb-3 fade-up" id="q-card">
    <div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px;" id="q-meta"></div>
    <p style="font-size:.95rem;font-weight:600;line-height:1.6;margin-bottom:18px;" id="q-enonce">-</p>
    <div id="q-choices" class="space-y-2"></div>
  </div>
  <div id="q-expl" class="hidden card p-4 mb-3" style="border-left:4px solid #3b82f6;">
    <div style="font-size:.65rem;font-weight:700;color:#3b82f6;text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px;">Explication</div>
    <p style="font-size:.84rem;line-height:1.6;" id="q-expl-txt"></p>
  </div>
  <button onclick="nextQ()" class="btn btn-blue hidden" style="width:100%;padding:13px;" id="btn-next">Question suivante &#8594;</button>
  <button onclick="showResults()" class="btn btn-green hidden" style="width:100%;padding:13px;" id="btn-fin">Voir mes r&#233;sultats</button>
</div>

<!-- RESULTATS -->
<div id="scr-result" class="flex-1 p-4 hidden" style="max-width:560px;width:100%;margin:0 auto;">
  <div class="card p-5 text-center mb-4 fade-up">
    <div class="score-ring mx-auto mb-3">
      <svg viewBox="0 0 120 120" width="120" height="120">
        <circle class="ring-bg" cx="60" cy="60" r="52"/>
        <circle class="ring-fill" id="ring-fill" cx="60" cy="60" r="52" stroke="#3b82f6" style="stroke-dasharray:0 327;"/>
      </svg>
      <div class="score-center">
        <div class="logo-t" style="font-size:1.7rem;" id="r-pct">0%</div>
        <div style="font-size:.7rem;color:#6b7280;">Score</div>
      </div>
    </div>
    <div style="font-size:1.8rem;margin-bottom:6px;" id="r-emoji"></div>
    <div class="logo-t" style="font-size:1.05rem;margin-bottom:4px;" id="r-msg"></div>
    <div style="font-size:.8rem;color:#6b7280;margin-bottom:16px;" id="r-detail"></div>
    <div style="display:flex;justify-content:center;gap:24px;">
      <div><div class="logo-t" style="font-size:1.4rem;color:#059669;" id="r-ok">0</div><div style="font-size:.68rem;color:#6b7280;">Correctes</div></div>
      <div><div class="logo-t" style="font-size:1.4rem;color:#ef4444;" id="r-ko">0</div><div style="font-size:.68rem;color:#6b7280;">Incorrectes</div></div>
      <div><div class="logo-t" style="font-size:1.4rem;color:#6b7280;" id="r-time">0s</div><div style="font-size:.68rem;color:#6b7280;">Dur&#233;e</div></div>
    </div>
  </div>
  <div id="analyse-wrap" class="card p-4 mb-4 hidden">
    <div style="font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#6b7280;margin-bottom:12px;">Analyse par partie</div>
    <div id="analyse-list"></div>
  </div>
  <div id="correction-wrap" class="hidden">
    <div style="font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#6b7280;margin-bottom:10px;">Correction d&#233;taill&#233;e</div>
    <div id="correction-list" class="space-y-3"></div>
  </div>
  <div style="display:flex;gap:8px;margin-top:16px;margin-bottom:24px;">
    <button onclick="restartSame()" class="btn btn-blue flex-1">Recommencer</button>
    <button onclick="goHome()" class="btn btn-gray flex-1">Accueil</button>
  </div>
</div>
</div>

<!-- MODAL HISTORIQUE -->
<div id="modal-histo" class="modal-bg hidden">
  <div class="modal-box">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
      <div class="logo-t" style="font-size:1rem;">Mon historique</div>
      <button onclick="closeModalHisto()" style="background:none;border:none;font-size:1.2rem;cursor:pointer;color:#6b7280;">&#x2715;</button>
    </div>
    <div id="modal-histo-content"></div>
  </div>
</div>

<!-- MODAL ERREURS -->
<div id="modal-erreurs" class="modal-bg hidden">
  <div class="modal-box">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;">
      <div class="logo-t" style="font-size:1rem;">Questions &#224; retravailler</div>
      <button onclick="closeModalErreurs()" style="background:none;border:none;font-size:1.2rem;cursor:pointer;color:#6b7280;">&#x2715;</button>
    </div>
    <div id="modal-erreurs-sub" style="font-size:.78rem;color:#6b7280;margin-bottom:16px;"></div>
    <div id="modal-erreurs-content"></div>
  </div>
</div>

<div id="confetti" style="position:fixed;inset:0;pointer-events:none;z-index:999;overflow:hidden;"></div>

<script>
// Structure officielle SSIAP
const STRUCT = {"SSIAP1": [{"id": "f7ccb450-42ee-4004-ad04-518a91ef025d", "nom": "LE FEU ET SES CONSÉQUENCES", "sequences": [{"id": "d56cc001-cbf8-44a2-801b-890c45b0a3d1", "nom": "LE FEU", "themes": ["Éclosion et développement du feu"]}, {"id": "15c98f90-e31d-4b8f-a297-11571a862a01", "nom": "COMPORTEMENT AU FEU", "themes": ["Réaction et résistance au feu"]}]}, {"id": "40dcfdc8-71cc-454c-b7ec-7b0e58b6dce3", "nom": "SECURITE INCENDIE", "sequences": [{"id": "6c29c208-e37e-4e3e-b738-ce21b39f10db", "nom": "FONDAMENTAUX ET PRINCIPES GENERAUX DE SECURITE INCENDIE", "themes": ["Fondamentaux de sécurité :"]}, {"id": "074cdb89-f644-4fc7-b8d6-32b2421085af", "nom": "DESSERTE DES BATIMENTS", "themes": ["Dessertes et Voiries : définition des voies engin et échelle"]}, {"id": "52b9a3cf-9644-4b05-b187-c694890a3f7e", "nom": "CLOISONNEMENT D'ISOLATION DES RISQUES", "themes": ["Intérêt du cloisonnement en matière de sécurité incendie"]}, {"id": "6fa991f8-3d33-4fbf-8b3f-c32de1e5e0b7", "nom": "EVACUATION DU PUBLIC ET DES OCCUPANTS", "themes": ["Vérification de la vacuité des dégagements et encadrement d'une évacuation"]}, {"id": "88b3f033-a0e3-46d4-b101-f800ed9eb0e0", "nom": "DÉSENFUMAGE", "themes": ["Rôle et mise en œuvre du désenfumage"]}, {"id": "92819a54-0b97-4032-962a-2ee2b8ddfa46", "nom": "ECLAIRAGE DE SECURITE", "themes": ["Intérêt de l'éclairage de sécurité et son fonctionnement"]}, {"id": "72711cf1-6043-4b0c-9e7c-a1a4dad1e778", "nom": "PRESENTATION DES DIFFERENTS MOYENS DE SECOURS", "themes": ["Les différents moyens de secours, les extincteurs et leur utilisation"]}]}, {"id": "7c481f53-cb5e-435d-b488-733f7c1f552f", "nom": "INSTALLATIONS TECHNIQUES", "sequences": [{"id": "4daf894d-d17f-4b01-8c95-4c04cdd6d63a", "nom": "INSTALLATIONS ELECTRIQUES", "themes": ["Les installations électriques et leur impact en matière de sécurité incendie"]}, {"id": "0ca3759a-fb22-4870-a265-5684df5f9c0b", "nom": "ASCENSEURS ET NACELLES", "themes": ["Procédures et moyens de dégagement d'une personne bl const urlP=new URLSearchParams(window.location.search);
let STAGIAIRE_ID=urlP.get('stagiaire'),CENTER_ID=urlP.get('center'),SESSION_ID=urlP.get('session'),NIVEAU_PARAM=urlP.get('niveau');
let selectedNiveau='SSIAP1',selectedNb=10;
// Filtres : Set de boite_ids (parties) + Set de seq noms + Set de themes
let selParties=new Set(),selSeqs=new Set(),selThemes=new Set();
let questions=[],currentIdx=0,correctCount=0,wrongCount=0,reponses=[],sessionId=null,startTime=null,answered=false,lastConfig={};

window.addEventListener('DOMContentLoaded',async()=>{
  const s=SESSION.load('stagiaire');
  if(s){STAGIAIRE_ID=STAGIAIRE_ID||s.stagiaire_id;CENTER_ID=CENTER_ID||s.center_id;NIVEAU_PARAM=NIVEAU_PARAM||s.stagiaire_niveau;
    document.getElementById('top-stag').textContent=s.stagiaire_nom||'';
    document.getElementById('home-titre').textContent='Bonjour '+(s.stagiaire_prenom||s.stagiaire_nom||'')+' !';
  }
  if(NIVEAU_PARAM){
    selectedNiveau=NIVEAU_PARAM;
    ['SSIAP1','SSIAP2','SSIAP3'].forEach((n,i)=>{const b=document.getElementById('bn'+(i+1));if(b)b.disabled=n!==NIVEAU_PARAM;});
    document.getElementById('top-badge').textContent=NIVEAU_PARAM;
    document.getElementById('top-badge').classList.remove('hidden');
  }
  updateNiveauUI();
  renderFilters();

});

function selectNiveau(n){if(NIVEAU_PARAM)return;selectedNiveau=n;selParties.clear();selSeqs.clear();selThemes.clear();updateNiveauUI();renderFilters();}
function updateNiveauUI(){['SSIAP1','SSIAP2','SSIAP3'].forEach((n,i)=>{const b=document.getElementById('bn'+(i+1));if(b)b.className='nb-btn'+(n===selectedNiveau?' sel':'');});}
function selectNb(n){selectedNb=n;[5,10,15,20,30,40].forEach(v=>{const b=document.getElementById('bnb'+v);if(b)b.className='nb-btn'+(v===n?' sel':'');});}

// ============================================================
// FILTRES PARTIE / SEQUENCE / THEME
// ============================================================
function renderFilters(){
  const el=document.getElementById('filter-list');
  const parties=STRUCT[selectedNiveau]||[];
  const allSel=selParties.size===0&&selSeqs.size===0&&selThemes.size===0;
  
  let html=`<div class="filter-item filter-all ${allSel?'sel':''}" onclick="selectAll()">
    <input type="checkbox" class="chk" ${allSel?'checked':''} readonly style="pointer-events:none;${allSel?'background:#6366f1;border-color:#6366f1;':''}">
    <span style="font-size:.88rem;font-weight:700;">Toutes les parties</span>
  </div>`;
  
  parties.forEach(p=>{
    const pSel=selParties.has(p.id);
    html+=`<div class="filter-item filter-partie ${pSel?'sel':''}" onclick="togglePartie('${p.id}')">
      <input type="checkbox" class="chk" ${pSel?'checked':''} readonly style="pointer-events:none;${pSel?'background:#059669;border-color:#059669;':''}">
      <span style="font-size:.84rem;font-weight:700;color:#065f46;">${p.nom}</span>
    </div>`;
    
    if(pSel){
      // Afficher les séquences
      p.sequences.forEach(s=>{
        const sSel=selSeqs.has(s.nom);
        html+=`<div class="filter-item filter-seq ${sSel?'sel':''}" onclick="toggleSeq('${p.id}','${s.nom.replace(/'/g,"\\'")}')" style="margin-left:16px;">
          <input type="checkbox" class="chk" ${sSel?'checked':''} readonly style="pointer-events:none;${sSel?'background:#3b82f6;border-color:#3b82f6;':''}">
          <span style="font-size:.82rem;">${s.nom}</span>
        </div>`;
        
        if(sSel&&s.themes&&s.themes.length){
          s.themes.forEach(th=>{
            const thSel=selThemes.has(th);
            html+=`<div class="filter-item filter-theme ${thSel?'sel':''}" onclick="toggleTheme('${th.replace(/'/g,"\\'")}')" style="margin-left:32px;">
              <input type="checkbox" class="chk" ${thSel?'checked':''} readonly style="pointer-events:none;${thSel?'background:#3b82f6;border-color:#3b82f6;':''}">
              <span style="font-size:.78rem;">${th}</span>
            </div>`;
          });
        }
      });
    }
  });
  
  el.innerHTML=html;
  
  // Résumé filtre actif
  let summary='';
  if(allSel) summary='Toutes les questions';
  else if(selThemes.size) summary=selThemes.size+' th&#232;me(s)';
  else if(selSeqs.size) summary=selSeqs.size+' s&#233;quence(s)';
  else summary=selParties.size+' partie(s)';
  document.getElementById('btn-start').textContent='D&#233;marrer — '+summary;
}

function selectAll(){selParties.clear();selSeqs.clear();selThemes.clear();renderFilters();}

function togglePartie(id){
  if(selParties.has(id)){selParties.delete(id);// désélectionner séqs et thèmes de cette partie
    const p=(STRUCT[selectedNiveau]||[]).find(x=>x.id===id);
    if(p)p.sequences.forEach(s=>{selSeqs.delete(s.nom);s.themes&&s.themes.forEach(t=>selThemes.delete(t));});
  }else{selParties.add(id);}
  renderFilters();
}

function toggleSeq(partieId,seqNom){
  if(!selParties.has(partieId)) selParties.add(partieId);
  if(selSeqs.has(seqNom)){selSeqs.delete(seqNom);
    // Désélectionner les thèmes de cette séq
    const p=(STRUCT[selectedNiveau]||[]).find(x=>x.id===partieId);
    if(p){const s=p.sequences.find(x=>x.nom===seqNom);if(s&&s.themes)s.themes.forEach(t=>selThemes.delete(t));}
  }else selSeqs.add(seqNom);
  renderFilters();
}

function toggleTheme(th){
  if(selThemes.has(th))selThemes.delete(th);else selThemes.add(th);
  renderFilters();
}

// ============================================================
// DÉMARRER SESSION
// ============================================================
async function startSession(){
  const errEl=document.getElementById('home-err');errEl.classList.add('hidden');
  const btn=document.getElementById('btn-start');btn.disabled=true;btn.innerHTML='<span class="spin"></span> Chargement...';
  lastConfig={niveau:selectedNiveau,nb:selectedNb,parties:new Set(selParties),seqs:new Set(selSeqs),themes:new Set(selThemes)};
  
  try{
    let q=supabase.from('questions').select('*').eq('niveau',selectedNiveau).eq('actif',true);
    
    if(selThemes.size>0){
      q=q.in('titre',[...selThemes]);
    }else if(selSeqs.size>0){
      // Filtrer par séquence : trouver les thèmes des séquences sélectionnées
      const themes=[];
      (STRUCT[selectedNiveau]||[]).forEach(p=>p.sequences.filter(s=>selSeqs.has(s.nom)).forEach(s=>s.themes&&themes.push(...s.themes)));
      if(themes.length) q=q.in('titre',themes);
    }else if(selParties.size>0){
      q=q.in('boite_id',[...selParties]);
    }
    
    const{data,error}=await q;
    if(error)throw error;
    if(!data||data.length<2)throw new Error('Pas assez de questions pour ce filtre. Ajoutez des questions ou élargissez le filtre.');
    
    questions=shuffle(data).slice(0,Math.min(selectedNb,data.length));
    currentIdx=0;correctCount=0;wrongCount=0;reponses=[];answered=false;startTime=Date.now();
    
    if(STAGIAIRE_ID){
      const{data:sess}=await supabase.from('entrainement_sessions').insert({stagiaire_id:STAGIAIRE_ID,center_id:CENTER_ID||null,session_formation_id:SESSION_ID||null,niveau:selectedNiveau,total:questions.length,score:0,statut:'en_cours'}).select().single();
      sessionId=sess?.id||null;
    }
    
    updateTopScore();showScreen('scr-question');renderQuestion();
  }catch(e){errEl.textContent='Erreur : '+e.message;errEl.classList.remove('hidden');}
  finally{btn.disabled=false;renderFilters();}
}

// ============================================================
// QUESTION
// ============================================================
function renderQuestion(){
  const q=questions[currentIdx];if(!q){showResults();return;}
  answered=false;
  document.getElementById('prog').style.width=Math.round(currentIdx/questions.length*100)+'%';
  document.getElementById('q-counter').textContent=(currentIdx+1)+'/'+questions.length;
  const meta=document.getElementById('q-meta');meta.innerHTML='';
  const th=q.titre||q.theme||'';
  if(th){const b=document.createElement('span');b.className='badge b-blue';b.textContent=th;meta.appendChild(b);}
  document.getElementById('q-enonce').textContent=q.question||'-';
  document.getElementById('q-expl').classList.add('hidden');
  document.getElementById('btn-next').classList.add('hidden');
  document.getElementById('btn-fin').classList.add('hidden');
  const choices=buildChoices(q);
  const el=document.getElementById('q-choices');el.innerHTML='';
  choices.forEach(ch=>{
    const btn=document.createElement('button');btn.className='choice-btn';btn.textContent=ch.text;
    btn.onclick=()=>selectAnswer(btn,ch.correct,q,choices);el.appendChild(btn);
  });
  const card=document.getElementById('q-card');card.classList.remove('fade-up');void card.offsetWidth;card.classList.add('fade-up');
}

function buildChoices(q){
  const d=q.data||q.données||q.donnees;
  if(d){
    const opts=d.options||[];
    const correct=d.correctAnswer;
    const corrects=d.correctAnswers||(correct!==undefined?[correct]:[0]);
    return shuffle(opts.map((o,i)=>({'text':typeof o==='string'?o:(o.text||String(o)),'correct':corrects.includes(i)})));
  }
  if(q.option_a){const opts=[];['a','b','c','d'].forEach(l=>{if(q['option_'+l])opts.push({'text':q['option_'+l],'correct':q.bonne_reponse===l});});return shuffle(opts);}
  return [{'text':'Format inconnu','correct':true}];
}

function selectAnswer(btn,isCorrect,q,choices){
  if(answered)return;answered=true;
  const allBtns=document.querySelectorAll('.choice-btn');allBtns.forEach(b=>b.disabled=true);
  const bon=choices.find(c=>c.correct)?.text||'-';
  if(isCorrect){btn.classList.add('correct');correctCount++;}
  else{btn.classList.add('wrong');wrongCount++;allBtns.forEach(b=>{if(b.textContent===bon)b.classList.add('show-ok');});}
  reponses.push({q,isCorrect,choisi:btn.textContent,bon});
  updateTopScore();
  if(sessionId)supabase.from('entrainement_reponses').insert({session_id:sessionId,question_id:q.id,est_correcte:isCorrect}).then(()=>{});
  const expl=q.explication||'';
  if(expl){document.getElementById('q-expl-txt').textContent=expl;document.getElementById('q-expl').classList.remove('hidden');}
  if(currentIdx+1<questions.length)document.getElementById('btn-next').classList.remove('hidden');
  else document.getElementById('btn-fin').classList.remove('hidden');
}

function nextQ(){currentIdx++;renderQuestion();}
function updateTopScore(){document.getElementById('top-score').style.display='flex';document.getElementById('sc-ok').textContent='OK: '+correctCount;document.getElementById('sc-ko').textContent='KO: '+wrongCount;}

async function showResults(){
  const total=questions.length,pct=Math.round(correctCount/total*100),dur=Math.round((Date.now()-startTime)/1000);
  if(sessionId)await supabase.from('entrainement_sessions').update({score:correctCount,statut:'terminee',duree_secondes:dur}).eq('id',sessionId);
  showScreen('scr-result');
  document.getElementById('r-pct').textContent=pct+'%';document.getElementById('r-ok').textContent=correctCount;document.getElementById('r-ko').textContent=wrongCount;
  const m=Math.floor(dur/60),s=dur%60;document.getElementById('r-time').textContent=(m>0?m+'m ':'')+s+'s';
  document.getElementById('r-detail').textContent=correctCount+' / '+total+' correctes';
  let msg,emoji;
  if(pct>=90){msg='Excellent !';emoji='&#x1F947;';}else if(pct>=75){msg='Tres bien !';emoji='&#x1F389;';}else if(pct>=60){msg='Continuez !';emoji='&#x1F4AA;';}else{msg='A retravailler';emoji='&#x1F504;';}
  document.getElementById('r-msg').textContent=msg;document.getElementById('r-emoji').innerHTML=emoji;
  const circ=2*Math.PI*52,ring=document.getElementById('ring-fill');
  ring.style.stroke=pct>=75?'#10b981':pct>=50?'#f59e0b':'#ef4444';
  setTimeout(()=>{ring.style.strokeDasharray=(circ*pct/100)+' '+circ;},100);
  if(pct>=75)createConfetti();
  // Analyse par boite
  const byB={};
  reponses.forEach(r=>{const bid=r.q.boite_id||'?';if(!byB[bid])byB[bid]={ok:0,n:0,nom:''};byB[bid].n++;if(r.isCorrect)byB[bid].ok++;
    if(!byB[bid].nom){const p=(STRUCT[selectedNiveau]||[]).find(x=>x.id===bid);byB[bid].nom=p?p.nom:'Autre';}
  });
  if(Object.keys(byB).length>1){
    document.getElementById('analyse-wrap').classList.remove('hidden');
    document.getElementById('analyse-list').innerHTML=Object.values(byB).map(v=>{
      const p2=Math.round(v.ok/v.n*100),col=p2>=75?'#10b981':p2>=50?'#f59e0b':'#ef4444';
      return '<div style="margin-bottom:10px;"><div style="display:flex;justify-content:space-between;font-size:.82rem;font-weight:600;margin-bottom:4px;"><span>'+v.nom+'</span><span style="color:'+col+';">'+v.ok+'/'+v.n+' - '+p2+'%</span></div><div class="prog-bar"><div class="prog-fill" style="width:'+p2+'%;background:'+col+';"></div></div></div>';
    }).join('');
  }
  // Correction
  document.getElementById('correction-wrap').classList.remove('hidden');
  document.getElementById('correction-list').innerHTML=reponses.map((r,i)=>{
    const cls=r.isCorrect?'b-green':'b-red',lbl=r.isCorrect?'Correct':'Incorrect';
    return '<div class="card p-4"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;"><span style="font-size:.75rem;font-weight:700;color:#6b7280;">Question '+(i+1)+'</span><span class="badge '+cls+'">'+lbl+'</span></div><p style="font-size:.88rem;font-weight:600;margin-bottom:8px;">'+(r.q.question||'')+'</p>'
      +(!r.isCorrect?'<div style="background:#fff1f2;border-radius:8px;padding:8px 12px;margin-bottom:6px;font-size:.82rem;"><strong style="color:#b91c1c;">Votre r&#233;ponse :</strong> '+r.choisi+'</div><div style="background:#f0fdf4;border-radius:8px;padding:8px 12px;margin-bottom:6px;font-size:.82rem;"><strong style="color:#065f46;">Bonne r&#233;ponse :</strong> '+r.bon+'</div>':'')
      +(r.q.explication?'<div style="background:#eff6ff;border-radius:8px;padding:8px 12px;font-size:.8rem;color:#1d4ed8;"><strong>Explication :</strong> '+r.q.explication+'</div>':'')+'</div>';
  }).join('');
  await loadHistorique();
}

async function loadHistorique(){
  if(!STAGIAIRE_ID)return;
  try{
    const{data}=await supabase.from('entrainement_sessions').select('*').eq('stagiaire_id',STAGIAIRE_ID).order('created_at',{ascending:false}).limit(10);
    if(!data||!data.length)return;
    document.getElementById('histo-wrap').classList.remove('hidden');
    const list=document.getElementById('histo-list');
    list.innerHTML=data.slice(0,3).map(s=>{
      const p=s.total?Math.round(s.score/s.total*100):0,col=p>=75?'#059669':p>=50?'#d97706':'#b91c1c';
      const dt=new Date(s.created_at).toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});
      return '<div class="card p-3 mb-2" style="display:flex;align-items:center;gap:12px;"><div style="font-family:Syne,sans-serif;font-size:1.2rem;font-weight:900;color:'+col+';min-width:44px;">'+p+'%</div><div style="flex:1;"><div style="font-size:.82rem;font-weight:700;">'+s.niveau+' - '+s.total+' questions</div><div style="font-size:.72rem;color:#9ca3af;">'+dt+'</div></div><span class="badge '+(p>=75?'b-green':p>=50?'b-orange':'b-red')+'">'+s.score+'/'+s.total+'</span></div>';
    }).join('');
    if(data.length>3)list.innerHTML+='<button onclick="openModalHisto()" class="btn btn-gray btn-sm" style="width:100%;margin-top:6px;">Voir tout l'historique</button>';
  }catch(e){console.error(e);}
}

async function openModalHisto(){
  if(!STAGIAIRE_ID)return;
  const{data}=await supabase.from('entrainement_sessions').select('*').eq('stagiaire_id',STAGIAIRE_ID).order('created_at',{ascending:false}).limit(20);
  if(!data)return;
  const total=data.length,moy=total?Math.round(data.reduce((a,s)=>a+(s.total?s.score/s.total*100:0),0)/total):0,reussis=data.filter(s=>s.total&&s.score/s.total>=0.6).length;
  let html='<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:16px;"><div class="card p-3 text-center"><div class="logo-t" style="font-size:1.4rem;color:#3b82f6;">'+total+'</div><div style="font-size:.68rem;color:#6b7280;">Entr.</div></div><div class="card p-3 text-center"><div class="logo-t" style="font-size:1.4rem;color:'+(moy>=60?'#059669':'#ef4444')+';">'+moy+'%</div><div style="font-size:.68rem;color:#6b7280;">Moyenne</div></div><div class="card p-3 text-center"><div class="logo-t" style="font-size:1.4rem;color:#059669;">'+reussis+'</div><div style="font-size:.68rem;color:#6b7280;">R&#233;ussis</div></div></div>';
  html+=data.map(s=>{
    const p=s.total?Math.round(s.score/s.total*100):0,col=p>=75?'#059669':p>=50?'#d97706':'#b91c1c';
    const dt=new Date(s.created_at).toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});
    return '<div class="card p-3 mb-2" style="display:flex;align-items:center;gap:12px;"><div style="font-family:Syne,sans-serif;font-size:1.1rem;font-weight:900;color:'+col+';min-width:40px;">'+p+'%</div><div style="flex:1;"><div style="font-size:.82rem;font-weight:700;">'+s.niveau+' - '+s.total+' q - '+(s.duree_secondes||0)+'s</div><div style="font-size:.7rem;color:#9ca3af;">'+dt+'</div>'+(p<60?'<button onclick="reviewErrors(''+s.id+'')" style="margin-top:4px;background:#fff7ed;border:1px solid #fed7aa;color:#c2410c;border-radius:6px;padding:3px 8px;font-size:.68rem;font-weight:700;cursor:pointer;">Revoir les erreurs &#8594;</button>':'<div style="font-size:.68rem;color:#059669;margin-top:2px;">Aucune erreur !</div>')+'</div><span class="badge '+(p>=75?'b-green':p>=50?'b-orange':'b-red')+'">'+s.score+'/'+s.total+'</span></div>';
  }).join('');
  document.getElementById('modal-histo-content').innerHTML=html;
  document.getElementById('modal-histo').classList.remove('hidden');
}
function closeModalHisto(){document.getElementById('modal-histo').classList.add('hidden');}

async function reviewErrors(sessId){
  const{data:reps}=await supabase.from('entrainement_reponses').select('question_id').eq('session_id',sessId).eq('est_correcte',false);
  if(!reps||!reps.length){alert('Aucune erreur.');return;}
  const{data:qs}=await supabase.from('questions').select('*').in('id',reps.map(r=>r.question_id));
  if(!qs||!qs.length)return;
  document.getElementById('modal-erreurs-sub').textContent=qs.length+' question(s) &#224; retravailler';
  document.getElementById('modal-erreurs-content').innerHTML=qs.map((q,i)=>{
    const bon=buildChoices(q).find(c=>c.correct);
    return '<div class="card p-4 mb-3"><div style="font-size:.65rem;font-weight:700;color:#6b7280;text-transform:uppercase;margin-bottom:6px;">Question '+(i+1)+'</div><p style="font-size:.88rem;font-weight:600;margin-bottom:10px;">'+(q.question||'')+'</p><div style="background:#f0fdf4;border-radius:8px;padding:8px 12px;font-size:.82rem;color:#065f46;margin-bottom:6px;"><strong>Bonne r&#233;ponse :</strong> '+(bon?.text||'-')+'</div>'+(q.explication?'<div style="background:#eff6ff;border-radius:8px;padding:8px 12px;font-size:.8rem;color:#1d4ed8;"><strong>Explication :</strong> '+q.explication+'</div>':'')+'</div>';
  }).join('');
  closeModalHisto();document.getElementById('modal-erreurs').classList.remove('hidden');
}
function closeModalErreurs(){document.getElementById('modal-erreurs').classList.add('hidden');}

function restartSame(){selectedNiveau=lastConfig.niveau;selectedNb=lastConfig.nb;selParties=new Set(lastConfig.parties);selSeqs=new Set(lastConfig.seqs);selThemes=new Set(lastConfig.themes);updateNiveauUI();[5,10,15,20,30,40].forEach(v=>{const b=document.getElementById('bnb'+v);if(b)b.className='nb-btn'+(v===selectedNb?' sel':'');});renderFilters();startSession();}
function goHome(){showScreen('scr-home');document.getElementById('top-score').style.display='none';currentIdx=0;correctCount=0;wrongCount=0;}
function goBack(){
  if(!document.getElementById('scr-home').classList.contains('hidden')){if(STAGIAIRE_ID)window.location.href='stagiaire.html';else window.history.back();}
  else if(confirm('Abandonner ?'))goHome();
}
function showScreen(id){['scr-home','scr-question','scr-result'].forEach(s=>document.getElementById(s).classList.toggle('hidden',s!==id));}
function shuffle(a){const r=[...a];for(let i=r.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[r[i],r[j]]=[r[j],r[i]];}return r;}
function createConfetti(){const c=['#6366f1','#3b82f6','#10b981','#f59e0b','#ef4444'];for(let i=0;i<60;i++){const d=document.createElement('div');d.style.cssText='position:fixed;width:'+(5+Math.random()*8)+'px;height:'+(5+Math.random()*8)+'px;background:'+c[Math.floor(Math.random()*c.length)]+';left:'+Math.random()*100+'vw;top:-10px;z-index:9999;border-radius:'+(Math.random()>.5?'50%':'2px')+';animation:cf '+(2+Math.random()*2)+'s linear forwards;';document.getElementById('confetti').appendChild(d);setTimeout(()=>d.remove(),4000);}}
</script>
