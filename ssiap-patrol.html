<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SSIAP Patrol — MIB Prévention</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="supabase.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
*{box-sizing:border-box;}
body{font-family:'Poppins',sans-serif;background:#f8fafc;}
.gradient-bg{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);}
.gradient-header{background:linear-gradient(90deg,#6366f1 0%,#8b5cf6 100%);}
.gradient-success{background:linear-gradient(90deg,#10b981 0%,#34d399 100%);}
.gradient-warning{background:linear-gradient(90deg,#f59e0b 0%,#fbbf24 100%);}
.gradient-danger{background:linear-gradient(90deg,#ef4444 0%,#f87171 100%);}
.gradient-info{background:linear-gradient(90deg,#3b82f6 0%,#60a5fa 100%);}
.card{background:white;border-radius:16px;box-shadow:0 4px 20px rgba(0,0,0,0.08);overflow:hidden;}
.sidebar{width:280px;background:white;height:100vh;position:fixed;left:0;top:0;z-index:50;transition:transform .3s;box-shadow:4px 0 20px rgba(0,0,0,.1);}
.nav-link{display:flex;align-items:center;gap:12px;padding:14px 20px;margin:4px 12px;border-radius:12px;color:#64748b;font-weight:500;transition:all .2s;cursor:pointer;}
.nav-link:hover{background:#f1f5f9;color:#6366f1;}
.nav-link.active{background:linear-gradient(90deg,#6366f1,#8b5cf6);color:white;box-shadow:0 4px 15px rgba(99,102,241,.4);}
.btn{padding:10px 20px;border-radius:10px;font-weight:600;transition:all .2s;display:inline-flex;align-items:center;gap:8px;cursor:pointer;border:none;font-size:14px;}
.btn:active{transform:scale(.98);}
.btn-primary{background:linear-gradient(90deg,#6366f1,#8b5cf6);color:white;}
.btn-primary:hover{box-shadow:0 4px 15px rgba(99,102,241,.4);}
.btn-success{background:linear-gradient(90deg,#10b981,#34d399);color:white;}
.btn-danger{background:linear-gradient(90deg,#ef4444,#f87171);color:white;}
.btn-warning{background:linear-gradient(90deg,#f59e0b,#fbbf24);color:white;}
.btn-secondary{background:#f1f5f9;color:#475569;}
.btn-sm{padding:6px 12px;font-size:13px;}
.btn-icon{width:36px;height:36px;padding:0;display:flex;align-items:center;justify-content:center;}
.input{width:100%;padding:12px 16px;border:2px solid #e2e8f0;border-radius:10px;font-size:15px;transition:all .2s;background:white;}
.input:focus{outline:none;border-color:#6366f1;box-shadow:0 0 0 3px rgba(99,102,241,.1);}
.input:disabled{background:#f1f5f9;cursor:not-allowed;}
.badge{padding:4px 12px;border-radius:20px;font-size:12px;font-weight:600;display:inline-block;}
.badge-success{background:#dcfce7;color:#16a34a;}
.badge-warning{background:#fef3c7;color:#d97706;}
.badge-danger{background:#fee2e2;color:#dc2626;}
.badge-info{background:#dbeafe;color:#2563eb;}
.badge-purple{background:#f3e8ff;color:#9333ea;}
.badge-gray{background:#f1f5f9;color:#64748b;}
.stat-card{padding:20px;border-radius:16px;text-align:center;background:white;}
.stat-card .icon{width:50px;height:50px;border-radius:12px;display:flex;align-items:center;justify-content:center;margin:0 auto 12px;font-size:20px;}
.stat-card .value{font-size:28px;font-weight:700;color:#1e293b;}
.stat-card .label{font-size:13px;color:#64748b;margin-top:4px;}
.table{width:100%;}
.table th{padding:14px 16px;text-align:left;font-weight:600;color:#64748b;font-size:13px;text-transform:uppercase;border-bottom:2px solid #e2e8f0;}
.table td{padding:14px 16px;border-bottom:1px solid #f1f5f9;}
.table tr:hover td{background:#f8fafc;}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px;backdrop-filter:blur(4px);}
.modal-content{background:white;border-radius:20px;max-width:500px;width:100%;max-height:90vh;overflow-y:auto;animation:modalIn .3s;}
@keyframes modalIn{from{opacity:0;transform:scale(.95) translateY(-20px)}to{opacity:1;transform:scale(1) translateY(0)}}
.modal-header{padding:20px 24px 0;}
.modal-body{padding:20px 24px;}
.modal-footer{padding:0 24px 20px;display:flex;gap:12px;justify-content:flex-end;}
.status-dot{width:12px;height:12px;border-radius:50%;display:inline-block;}
.status-dot.green{background:#10b981;box-shadow:0 0 8px #10b981;animation:pulse 2s infinite;}
.status-dot.orange{background:#f59e0b;box-shadow:0 0 8px #f59e0b;animation:pulse 2s infinite;}
.status-dot.red{background:#ef4444;box-shadow:0 0 8px #ef4444;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
.fade-in{animation:fadeIn .3s ease-out;}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.search-filters{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:16px;padding:16px;background:#f8fafc;border-radius:12px;}
.search-filters .input{max-width:200px;}
.qr-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:16px;}
.qr-card{padding:16px;border:2px solid #e2e8f0;border-radius:12px;text-align:center;background:white;}
#qr-reader{width:100%;min-height:250px;}
#qr-reader video{width:100%!important;border-radius:12px;}
.mobile-nav-btn{transition:all .2s;}
.mobile-nav-btn.active{color:#6366f1;}
@media(max-width:1024px){.sidebar{transform:translateX(-100%)}.sidebar.open{transform:translateX(0)}.main-content{margin-left:0!important}}
@media print{
  .no-print{display:none!important}
  .sidebar{display:none!important}
  .main-content{margin-left:0!important;padding:10px!important}
  body{font-size:11px!important;background:white!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .card{box-shadow:none!important;border:1px solid #ccc!important;page-break-inside:avoid;margin-bottom:10px}
  .table{font-size:11px!important}
  .table th,.table td{padding:6px 8px!important;font-size:11px!important}
  .badge{font-size:9px!important;padding:2px 6px!important}
  h1{font-size:16px!important;margin-bottom:10px!important}
  .stat-card,.search-filters{display:none!important}
  .gradient-header,.gradient-success,.gradient-warning,.gradient-info{background:#f3f4f6!important;color:#1f2937!important}
}
</style>
</head>
<body>

<!-- ════ LOGIN : SÉLECTION CENTRE ════ -->
<div id="loginScreen" class="gradient-bg min-h-screen flex items-center justify-center p-4">
  <div class="card p-8 w-full max-w-md fade-in">
    <div class="text-center mb-8">
      <div class="w-20 h-20 gradient-header rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg">
        <i class="fas fa-shield-alt text-white text-3xl"></i>
      </div>
      <h1 class="text-2xl font-bold text-gray-800">SSIAP Patrol</h1>
      <p class="text-gray-500 mt-1">MIB Prévention — Gestion des rondes</p>
    </div>

    <!-- Étape 1 : Centre -->
    <div id="step-centre">
      <label class="block text-sm font-semibold text-gray-700 mb-2">Centre de formation</label>
      <select id="loginCenter" class="input mb-4" onchange="onCentreChange(this.value)">
        <option value="">Chargement...</option>
      </select>
      <div id="loginCenterError" class="text-red-500 text-sm font-medium hidden mb-2"></div>
      <div id="loadingCentre" class="text-center py-4 hidden">
        <i class="fas fa-spinner fa-spin text-indigo-500 mr-2"></i>Chargement des agents...
      </div>
    </div>

    <!-- Étape 2 : Agent + PIN -->
    <div id="step-agent" class="hidden space-y-4">
      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-2">Agent</label>
        <select id="loginAgent" class="input"></select>
      </div>
      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-2">Code PIN</label>
        <input type="password" id="loginPassword" class="input" placeholder="••••••" maxlength="6" inputmode="numeric">
      </div>
      <div id="loginError" class="text-red-500 text-sm font-medium hidden"></div>
      <button onclick="login()" class="btn btn-primary w-full justify-center py-3">
        <i class="fas fa-sign-in-alt"></i> Se connecter
      </button>
      <button onclick="resetCentre()" class="btn btn-secondary w-full justify-center">
        <i class="fas fa-arrow-left"></i> Changer de centre
      </button>
    </div>

    <div class="pt-4 border-t mt-4">
      <button onclick="accederModeRondier()" class="btn btn-secondary w-full justify-center">
        <i class="fas fa-mobile-alt"></i> Accès Rondier Mobile
      </button>
    </div>
  </div>
</div>

<!-- ════ LOGIN RONDIER ════ -->
<div id="loginRondier" class="gradient-bg min-h-screen flex items-center justify-center p-4 hidden">
  <div class="card p-6 w-full max-w-md fade-in">
    <div class="text-center mb-6">
      <div class="w-16 h-16 bg-orange-500 rounded-2xl flex items-center justify-center mx-auto mb-4">
        <i class="fas fa-walking text-white text-2xl"></i>
      </div>
      <h1 class="text-xl font-bold" id="rondierCentreNom">Connexion Rondier</h1>
    </div>
    <div id="rondierLoading" class="text-center py-8">
      <i class="fas fa-sync-alt fa-spin text-3xl text-indigo-500 mb-4"></i>
      <p class="text-gray-500">Chargement...</p>
    </div>
    <div id="rondierContent" class="space-y-4 hidden">
      <div id="rondierAgentsList" class="space-y-2"></div>
      <div id="rondierNoAgent" class="text-center py-6 hidden">
        <i class="fas fa-exclamation-triangle text-yellow-600 text-3xl mb-3"></i>
        <p class="font-medium">Aucun rondier en poste</p>
        <p class="text-sm text-gray-500 mt-2">Contactez le PC Sécurité</p>
        <button onclick="rechargerAgentsRondier()" class="btn btn-secondary mt-4">
          <i class="fas fa-sync-alt"></i> Actualiser
        </button>
      </div>
    </div>
    <div class="mt-4 pt-4 border-t">
      <button onclick="retourLogin()" class="btn btn-secondary w-full justify-center">
        <i class="fas fa-arrow-left"></i> Retour
      </button>
    </div>
  </div>
</div>

<!-- ════ APP PRINCIPALE ════ -->
<div id="mainApp" class="hidden">
  <aside class="sidebar no-print" id="sidebar">
    <div class="p-6 border-b border-gray-100">
      <div class="flex items-center gap-3">
        <div class="w-12 h-12 gradient-header rounded-xl flex items-center justify-center shadow-lg">
          <i class="fas fa-shield-alt text-white text-xl"></i>
        </div>
        <div>
          <div class="font-bold text-lg">SSIAP Patrol</div>
          <div class="text-xs text-gray-500" id="centreBadge"></div>
          <div class="text-xs" id="userBadge"></div>
          <div class="text-xs mt-1" id="syncStatus"></div>
        </div>
      </div>
    </div>
    <nav class="py-4 overflow-y-auto" id="navMenu" style="max-height:calc(100vh - 220px);"></nav>
    <div class="absolute bottom-0 left-0 right-0 p-4 border-t bg-white space-y-2" id="sidebarActions"></div>
  </aside>

  <header id="mobileHeader" class="lg:hidden fixed top-0 left-0 right-0 bg-white shadow-md z-40 p-4 flex items-center justify-between no-print">
    <button onclick="toggleSidebar()" class="btn btn-icon btn-secondary"><i class="fas fa-bars"></i></button>
    <div class="font-bold">SSIAP Patrol</div>
    <button onclick="forcerSync()" class="btn btn-icon btn-secondary"><i class="fas fa-sync-alt"></i></button>
  </header>

  <header id="rondierHeader" class="lg:hidden fixed top-0 left-0 right-0 gradient-header text-white z-40 p-3 hidden no-print">
    <div class="flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 bg-white/20 rounded-full flex items-center justify-center">
          <i class="fas fa-walking"></i>
        </div>
        <div>
          <div class="font-semibold text-sm" id="rondierHeaderName">Rondier</div>
          <div class="text-xs opacity-80">En service</div>
        </div>
      </div>
      <button onclick="logout()" class="btn btn-sm bg-white/20 text-white">
        <i class="fas fa-sign-out-alt"></i>
      </button>
    </div>
  </header>

  <div id="sidebarOverlay" class="fixed inset-0 bg-black/50 z-40 hidden lg:hidden" onclick="toggleSidebar()"></div>

  <main class="main-content lg:ml-[280px] min-h-screen pt-20 lg:pt-6 pb-24 lg:pb-6">
    <div class="p-4 lg:p-6" id="mainContent"></div>
  </main>

  <nav id="mobileNavBar" class="lg:hidden fixed bottom-0 left-0 right-0 bg-white border-t z-50 hidden no-print">
    <div class="flex justify-around items-center h-16">
      <button onclick="navigate('rondes')" id="mobileNavRondes" class="mobile-nav-btn flex flex-col items-center justify-center flex-1 h-full text-gray-500">
        <i class="fas fa-route text-xl mb-1"></i><span class="text-xs">Rondes</span>
      </button>
      <button onclick="navigate('materiels')" id="mobileNavMateriels" class="mobile-nav-btn flex flex-col items-center justify-center flex-1 h-full text-gray-500">
        <i class="fas fa-fire-extinguisher text-xl mb-1"></i><span class="text-xs">Matériels</span>
      </button>
      <button onclick="navigate('consignes')" id="mobileNavConsignes" class="mobile-nav-btn flex flex-col items-center justify-center flex-1 h-full text-gray-500">
        <i class="fas fa-file-alt text-xl mb-1"></i><span class="text-xs">Consignes</span>
      </button>
    </div>
  </nav>
</div>

<div id="modalContainer"></div>

<script>
// ══════════════════════════════════════════
// ÉTAT GLOBAL
// ══════════════════════════════════════════
let currentCenter = null;
let currentUser   = null;
let currentView   = 'dashboard';
let patrolChannel = null;
let isSyncing     = false;
let modalConfirmCallback = null;
let html5QrScanner = null;
let adminTab = 'sync';

let DB = {
  agents: [], materiels: [], prisesPoste: [],
  rondes: [], evenements: [], mainCourante: [], consignes: []
};

let configEtablissement = {
  nom: 'Établissement',
  batiments: [{
    id: 'bat1', nom: 'Bâtiment Principal',
    secteurs: [{ id: 'bat1-rdc', nom: 'RDC', zones: ['Hall', 'Accueil', 'Couloir'] }]
  }]
};

let typesRondes = ['Ronde de sécurité','Ronde Extincteurs','Ronde RIA','Ronde BAES','Ouverture','Fermeture','Ronde technique'];

const categoriesRonde = [
  { id:'extincteurs', nom:'Extincteurs', icon:'fa-fire-extinguisher', types:['Extincteur'] },
  { id:'ria',        nom:'RIA',         icon:'fa-tint',             types:['RIA'] },
  { id:'baes',       nom:'BAES',        icon:'fa-lightbulb',        types:['BAES'] },
  { id:'pcf',        nom:'Portes CF',   icon:'fa-door-closed',      types:['Porte CF'] },
  { id:'detecteurs', nom:'Détecteurs',  icon:'fa-bell',             types:['Détecteur'] }
];

const typesEvenement = ['Alarme Incendie','Secours à personne','Incident','Intrusion','Problème technique','Incivilité','Autre'];

let filtresRondes       = { texte:'', statut:'', type:'' };
let filtresMainCourante = { texte:'', type:'', dateDebut:'', dateFin:'' };
let filtresMateriels    = { texte:'', type:'', statut:'' };
let filtresEvenements   = { texte:'', type:'', statut:'' };
let filtresAgents       = { texte:'', qualification:'' };
let filtresConsignes    = { texte:'', niveau:'', priorite:'' };
let filtresQRCodes      = { batiment:'', secteur:'', type:'' };
let filtresEtablissement= { batiment:'', secteur:'' };

// ══════════════════════════════════════════
// SUPABASE — DONNÉES
// ══════════════════════════════════════════

async function sauvegarderVersSupabase() {
  if (!currentCenter?.id || isSyncing) return;
  try {
    const { error } = await supabase.from('patrol_data').upsert({
      center_id:     currentCenter.id,
      agents:        DB.agents,
      materiels:     DB.materiels,
      prises_poste:  DB.prisesPoste,
      rondes:        DB.rondes,
      evenements:    DB.evenements,
      main_courante: DB.mainCourante.slice(0, 500),
      consignes:     DB.consignes,
      config:        configEtablissement,
      types_rondes:  typesRondes,
      updated_at:    new Date().toISOString()
    });
    updateSyncStatus(!error);
    if (!error) broadcastUpdate();
  } catch(e) { updateSyncStatus(false); }
}

async function chargerDonnees(centerId) {
  const { data } = await supabase.from('patrol_data').select('*').eq('center_id', centerId).maybeSingle();
  if (data) {
    if (data.agents?.length)        DB.agents        = data.agents;
    if (data.materiels?.length)     DB.materiels     = data.materiels;
    DB.prisesPoste  = data.prises_poste  || [];
    DB.rondes       = data.rondes        || [];
    DB.evenements   = data.evenements    || [];
    DB.mainCourante = data.main_courante || [];
    if (data.consignes?.length)     DB.consignes     = data.consignes;
    if (data.config?.batiments)     configEtablissement = data.config;
    if (data.types_rondes?.length)  typesRondes      = data.types_rondes;
  } else {
    await initialiserNouveauCentre(centerId);
  }
}

async function initialiserNouveauCentre(centerId) {
  // Importer les formateurs existants comme agents patrol
  const { data: formateurs } = await supabase
    .from('formateurs').select('id, nom, prenom, pin_hash, email, telephone')
    .eq('center_id', centerId).eq('actif', true);

  DB.agents = (formateurs || []).map(f => ({
    id: f.id,
    nom: f.nom, prenom: f.prenom,
    qualification: 'SSIAP 2',
    entreprise: currentCenter?.nom || '',
    email: f.email || '', telephone: f.telephone || '',
    pinHash: f.pin_hash,
    actif: true,
    type: 'formateur',
    dateDebutContrat: new Date().toISOString().split('T')[0]
  }));

  // Config établissement de base depuis le centre
  configEtablissement = {
    nom: currentCenter?.nom || 'Établissement',
    batiments: [{
      id: 'bat1', nom: 'Bâtiment Principal',
      secteurs: [
        { id: 'bat1-rdc', nom: 'RDC', zones: ['Hall','Accueil','Couloir','Sanitaires'] },
        { id: 'bat1-r1', nom: '1er étage', zones: ['Bureaux','Couloir','Sanitaires'] }
      ]
    }]
  };

  DB.consignes = [{
    id: genId(), titre: 'Bienvenue sur SSIAP Patrol',
    niveau: 'Permanente', destinataire: 'Tout le monde', priorite: 'Normale',
    contenu: 'Configurez la structure de votre établissement dans Administration > Établissement.',
    dateDebut: new Date().toISOString().split('T')[0], dateFin: null, active: true
  }];

  DB.materiels = [];
  await sauvegarderVersSupabase();
}

// ══════════════════════════════════════════
// TEMPS RÉEL — BROADCAST
// ══════════════════════════════════════════

function activerSyncTempsReel(centerId) {
  if (patrolChannel) supabase.removeChannel(patrolChannel);
  patrolChannel = supabase.channel(`patrol-${centerId}`, { config: { broadcast: { self: false } } })
    .on('broadcast', { event: 'update' }, async () => {
      isSyncing = true;
      await chargerDonnees(centerId);
      if (currentView && views[currentView]) {
        document.getElementById('mainContent').innerHTML = '<div class="fade-in">' + views[currentView]() + '</div>';
      }
      isSyncing = false;
      updateSyncStatus(true);
    })
    .subscribe();
}

async function broadcastUpdate() {
  if (patrolChannel) await patrolChannel.send({ type:'broadcast', event:'update', payload:{ ts: Date.now() } });
}

function updateSyncStatus(ok) {
  const el = document.getElementById('syncStatus');
  if (el) el.innerHTML = ok
    ? '<span class="text-green-600"><i class="fas fa-cloud"></i> Synchronisé</span>'
    : '<span class="text-red-600"><i class="fas fa-cloud-slash"></i> Hors ligne</span>';
}

async function forcerSync() {
  showToast('🔄 Synchronisation...','info');
  await sauvegarderVersSupabase();
  await chargerDonnees(currentCenter.id);
  navigate(currentView);
  showToast('✅ Synchronisé');
}

// ══════════════════════════════════════════
// LOGIN — SÉLECTION CENTRE
// ══════════════════════════════════════════

async function initLoginScreen() {
  // Vérifier paramètre URL ?center=xxx pour mode rondier
  const params = new URLSearchParams(window.location.search);
  const centerId = params.get('center');
  
  const { data: centers } = await supabase.from('centers')
    .select('id, nom').eq('license_status','active').order('nom');
  
  const sel = document.getElementById('loginCenter');
  sel.innerHTML = '<option value="">— Sélectionnez votre centre —</option>';
  (centers || []).forEach(c => {
    const opt = document.createElement('option');
    opt.value = c.id; opt.textContent = c.nom;
    sel.appendChild(opt);
  });

  if (centerId) {
    sel.value = centerId;
    await onCentreChange(centerId);
  }
}

async function onCentreChange(centerId) {
  if (!centerId) return;
  document.getElementById('loadingCentre').classList.remove('hidden');
  document.getElementById('step-agent').classList.add('hidden');

  const { data: centre } = await supabase.from('centers').select('*').eq('id', centerId).single();
  if (!centre) { document.getElementById('loginCenterError').textContent = 'Centre introuvable.'; document.getElementById('loginCenterError').classList.remove('hidden'); document.getElementById('loadingCentre').classList.add('hidden'); return; }
  
  currentCenter = centre;
  await chargerDonnees(centerId);
  
  document.getElementById('loadingCentre').classList.add('hidden');
  document.getElementById('loginCenterError').classList.add('hidden');
  
  // Remplir la liste des agents
  const sel = document.getElementById('loginAgent');
  const agentsActifs = DB.agents.filter(a => a.actif).sort((a,b) => {
    const o = { 'SSIAP 3':0, 'SSIAP 2':1, 'SSIAP 1':2 };
    return (o[a.qualification]??3) - (o[b.qualification]??3);
  });
  sel.innerHTML = '<option value="">Sélectionner un agent...</option>' +
    agentsActifs.map(a => `<option value="${a.id}">${a.prenom} ${a.nom} — ${a.qualification}</option>`).join('');
  
  document.getElementById('step-agent').classList.remove('hidden');
}

function resetCentre() {
  currentCenter = null;
  document.getElementById('step-agent').classList.add('hidden');
  document.getElementById('loginCenter').value = '';
  document.getElementById('loginPassword').value = '';
}

async function login() {
  const agentId = document.getElementById('loginAgent').value;
  const pwd     = document.getElementById('loginPassword').value;
  const errEl   = document.getElementById('loginError');
  errEl.classList.add('hidden');

  if (!agentId) return showLoginError('Sélectionnez un agent');
  if (!pwd)     return showLoginError('Entrez votre code PIN');

  const agent = DB.agents.find(a => String(a.id) === agentId);
  if (!agent) return showLoginError('Agent non trouvé');

  let pinOk = false;
  try {
    // Vérifier via hash SHA-256
    if (agent.pinHash) {
      const pwdHash = await UTILS.hash(pwd);
      pinOk = (pwdHash === agent.pinHash);
    }
    // Fallback : comparaison directe pin_clair (formateurs MIB)
    if (!pinOk && agent.pinClair) {
      pinOk = (pwd === agent.pinClair);
    }
  } catch(e) {}

  if (!pinOk) return showLoginError('Code PIN incorrect');

  currentUser = { ...agent };
  document.getElementById('loginScreen').classList.add('hidden');
  document.getElementById('mainApp').classList.remove('hidden');
  document.getElementById('centreBadge').textContent = currentCenter?.nom || '';
  document.getElementById('userBadge').innerHTML = `<span class="badge badge-purple">${currentUser.qualification}</span>`;
  
  initApp();
}

function showLoginError(msg) {
  const el = document.getElementById('loginError');
  el.textContent = msg; el.classList.remove('hidden');
  setTimeout(() => el.classList.add('hidden'), 3000);
}

function logout() {
  currentUser = null;
  if (patrolChannel) supabase.removeChannel(patrolChannel);
  document.getElementById('mainApp').classList.add('hidden');
  if (detecterModeRondier()) afficherLoginRondier(true);
  else { document.getElementById('loginScreen').classList.remove('hidden'); document.getElementById('loginPassword').value = ''; }
}

const formatDate = d => d ? new Date(d).toLocaleDateString('fr-FR') : '-';
const formatTime = d => d ? new Date(d).toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}) : '-';
const formatDateTime = d => d ? `${formatDate(d)} ${formatTime(d)}` : '-';
const genId = () => Date.now() + Math.floor(Math.random() * 1000);

function getAgentsEnPoste() {
  return DB.prisesPoste.filter(p => !p.finPoste).map(p => {
    const a = DB.agents.find(a => String(a.id) === String(p.agentId));
    return a ? { ...a, prisePosteId: p.id, poste: p.poste, heureDebut: p.heureDebut } : null;
  }).filter(Boolean);
}
function getChefDePoste() { return getAgentsEnPoste().find(a => a.poste === 'Chef de poste'); }

function addMainCourante(type, description, agentId, extra={}) {
  const agent = DB.agents.find(a => String(a.id) === String(agentId));
  const entree = { id: genId(), date: new Date().toISOString(), type, description, agent: agent ? `${agent.prenom} ${agent.nom}` : 'Système', agentId, ...extra };
  DB.mainCourante.unshift(entree);
  return entree;
}

function getStatutCouleurRonde(r) {
  if (!r.anomalies?.length) return 'green';
  if (r.anomalies.some(a => a.horsService)) return 'red';
  return 'orange';
}
function getBadgeClass(c) { return c==='green'?'badge-success':c==='orange'?'badge-warning':'badge-danger'; }

function getMainCouranteBadgeClass(type) {
  if (['Alarme','Secours','Incident','Intrusion','Anomalie'].some(t => type.includes(t))) return 'badge-danger';
  if (['Terminé','Fin','OK'].some(t => type.includes(t))) return 'badge-success';
  if (['Prise','Départ','Ronde','En cours'].some(t => type.includes(t))) return 'badge-warning';
  return 'badge-info';
}

  </div>`,null,'Retour');

function demarrerRondeZone(nom, batId, sectId) {
  let points = [];
  const addZones = (bat, sect) => sect.zones.forEach(zone => {
    const qr = `ZONE-${bat.id}-${sect.id}-${zone.toUpperCase().replace(/[^A-Z0-9]/g,'')}`;
    points.push({ id:genId(), nom:zone, chemin:`${bat.nom} > ${sect.nom}`, qrCode:qr, valide:false, heureValidation:null, statut:null });
  });
  if (!batId) configEtablissement.batiments.forEach(bat => bat.secteurs.forEach(s => addZones(bat,s)));
  else if (!sectId) { const bat = configEtablissement.batiments.find(b=>b.id===batId); bat?.secteurs.forEach(s=>addZones(bat,s)); }
  else { const bat=configEtablissement.batiments.find(b=>b.id===batId); const s=bat?.secteurs.find(x=>x.id===sectId); if(bat&&s) addZones(bat,s); }
  if (!points.length) { showToast('Aucun point de contrôle','error'); return; }
  const ronde = { id:genId(), type:'Ronde de sécurité', nom:`Ronde ${nom}`, zone:nom, agentId:currentUser.id, heureDebut:new Date().toISOString(), heureFin:null, pointsControle:points, anomalies:[] };
  DB.rondes.push(ronde);
  addMainCourante('Départ Ronde',`${ronde.nom} — ${points.length} points`,currentUser.id);
  sauvegarderVersSupabase(); showToast(`🚀 Ronde démarrée ! ${points.length} points`); navigate('rondes');
}

function demarrerScanQR(rondeId) {
  const qrReader = document.getElementById('qr-reader');
  const resultsDiv = document.getElementById('qr-reader-results');
  const btnStart = document.getElementById('btnStartScan');
  const btnStop = document.getElementById('btnStopScan');
  if (!qrReader || typeof Html5Qrcode === 'undefined') { resultsDiv.innerHTML='<span class="text-red-500">Scanner non disponible</span>'; return; }
  btnStart.classList.add('hidden'); btnStop.classList.remove('hidden');
  resultsDiv.innerHTML='<span class="text-blue-500"><i class="fas fa-spinner fa-spin mr-1"></i>Démarrage caméra...</span>';
  if (html5QrScanner) { try { html5QrScanner.stop(); } catch(e) {} html5QrScanner=null; }
  html5QrScanner = new Html5Qrcode("qr-reader");
  html5QrScanner.start({ facingMode:"environment" }, { fps:10, qrbox:{width:250,height:250} },
    (decodedText) => {
      resultsDiv.innerHTML=`<span class="text-green-600 font-bold"><i class="fas fa-check-circle mr-1"></i>${decodedText}</span>`;
      if (navigator.vibrate) navigator.vibrate(200);
      html5QrScanner.stop().then(()=>{ html5QrScanner=null; btnStart.classList.remove('hidden'); btnStop.classList.add('hidden'); setTimeout(()=>validerQRCode(rondeId,decodedText),500); }).catch(()=>setTimeout(()=>validerQRCode(rondeId,decodedText),500));
    }, ()=>{}
  ).then(()=>{ resultsDiv.innerHTML='<span class="text-green-500"><i class="fas fa-camera mr-1"></i>Pointez vers un QR code</span>'; })
   .catch(err=>{ resultsDiv.innerHTML=`<span class="text-red-500">${err}</span>`; btnStart.classList.remove('hidden'); btnStop.classList.add('hidden'); });
}

function arreterScanQR() {
  if (html5QrScanner) { html5QrScanner.stop().then(()=>{ html5QrScanner=null; document.getElementById('btnStartScan')?.classList.remove('hidden'); document.getElementById('btnStopScan')?.classList.add('hidden'); }).catch(()=>{}); }
}

function validerQRCode(rondeId, code) {
  const r = DB.rondes.find(x=>x.id===rondeId); if (!r) return;
  const codeNorm = code.trim().toUpperCase();

  if (!point) { showToast('Code QR non reconnu','error'); return; }
  if (point.valide) { showToast('Point déjà validé','warning'); return; }
  closeModal(); setTimeout(()=>ouvrirValidationPoint(rondeId,point.id),400);
}

function validerQRManuel(rondeId) { const code=document.getElementById('qrCodeManuel')?.value?.trim(); if (!code) { showToast('Entrez un code','error'); return; } validerQRCode(rondeId,code); }

      </div></div>
    </div>`,null,'Annuler');

function validerPoint(rondeId, pointId, statut) {
  const r=DB.rondes.find(x=>x.id===rondeId); if (!r) return;
  const point=r.pointsControle.find(p=>p.id===pointId); if (!point) return;
  if (statut==='OK') {
    point.valide=true; point.heureValidation=new Date().toISOString(); point.statut='OK';
    sauvegarderVersSupabase(); closeModal(); showToast(`✅ ${point.nom} validé !`);
    if (navigator.vibrate) navigator.vibrate(200); navigate('rondes');
  } else {
    const hs=statut==='HS'; const col=hs?'red':'orange'; closeModal();
    setTimeout(()=>{
      showModal(hs?'🚫 Hors Service':'⚠️ Anomalie',`<div class="space-y-4">
        <div class="bg-${col}-50 p-4 rounded-xl"><div class="font-semibold text-${col}-700">${point.nom}</div></div>
        <div><label class="block text-sm font-semibold mb-2">Description *</label><textarea id="anomalieDesc" class="input" rows="3" placeholder="Décrivez le problème..."></textarea></div>
        <div><label class="block text-sm font-semibold mb-2">Photos (optionnel)</label>
          <div class="flex gap-2 mb-2"><button type="button" onclick="ajouterPhoto()" class="btn btn-secondary flex-1"><i class="fas fa-camera mr-2"></i>Photo</button><button type="button" onclick="ajouterPhotoGalerie()" class="btn btn-secondary flex-1"><i class="fas fa-images mr-2"></i>Galerie</button></div>
          <input type="file" id="anomaliePhotoInput" accept="image/*" capture="environment" class="hidden" onchange="traiterPhotos(this)" multiple>
          <input type="file" id="anomaliePhotoGalerie" accept="image/*" class="hidden" onchange="traiterPhotos(this)" multiple>
          <div id="photosPreview" class="flex flex-wrap gap-2 mt-2"></div>
        </div>
      </div>`,()=>{
        const desc=document.getElementById('anomalieDesc').value.trim();
        if (!desc) { showToast('Description requise','error'); return; }
        point.valide=true; point.heureValidation=new Date().toISOString(); point.statut=statut;
        const photos=[]; document.querySelectorAll('#photosPreview img').forEach(img=>photos.push(img.src));
        if (!r.anomalies) r.anomalies=[];
        r.anomalies.push({ id:genId(), pointId, pointNom:point.nom, description:desc, photos, horsService:hs, date:new Date().toISOString(), agentId:currentUser.id });
        if (hs && point.materielId) { const mat=DB.materiels.find(m=>m.id===point.materielId); if (mat) { mat.statut='Hors Service'; mat.observation=desc; mat.dateHS=new Date().toISOString(); } }
        addMainCourante('Anomalie Ronde',`${hs?'🔴 HS':'🟠'} — ${point.nom}: ${desc}`,currentUser.id);
        sauvegarderVersSupabase(); closeModal(); showToast(hs?'🚫 Hors Service signalé':'⚠️ Anomalie signalée',hs?'error':'warning');
        if (navigator.vibrate) navigator.vibrate([100,50,100]); navigate('rondes');
      },'Enregistrer');
    },400);
  }
}

function ajouterPhoto() { document.getElementById('anomaliePhotoInput')?.click(); }
function ajouterPhotoGalerie() { document.getElementById('anomaliePhotoGalerie')?.click(); }

function traiterPhotos(input) {
  const preview=document.getElementById('photosPreview');
  if (!input.files?.length || !preview) return;
  Array.from(input.files).forEach(file=>{
    const reader=new FileReader();
    reader.onload=e=>{
      const img=new Image(); img.onload=()=>{
        const canvas=document.createElement('canvas'); const maxSize=800;
        let w=img.width, h=img.height;
        if (w>h&&w>maxSize){h=h*maxSize/w;w=maxSize;}else if(h>maxSize){w=w*maxSize/h;h=maxSize;}
        canvas.width=w; canvas.height=h; canvas.getContext('2d').drawImage(img,0,0,w,h);
        const compressed=canvas.toDataURL('image/jpeg',0.7);
        const pid='photo-'+Date.now()+Math.random().toString(36).substr(2,5);
        const div=document.createElement('div'); div.id=pid; div.className='relative';
        div.innerHTML=`<img src="${compressed}" class="w-20 h-20 object-cover rounded-lg"><button type="button" onclick="supprimerPhotoPreview('${pid}')" class="absolute -top-2 -right-2 w-6 h-6 bg-red-500 text-white rounded-full flex items-center justify-center text-xs"><i class="fas fa-times"></i></button>`;
        preview.appendChild(div);
      }; img.src=e.target.result;
    }; reader.readAsDataURL(file);
  }); input.value='';
}
function supprimerPhotoPreview(id) { document.getElementById(id)?.remove(); }

function voirPointsRonde(rondeId) {
  const r=DB.rondes.find(x=>x.id===rondeId); if (!r) return;
  const valides=r.pointsControle.filter(p=>p.valide);
  const nonValides=r.pointsControle.filter(p=>!p.valide);
  showModal('Points de contrôle',`<div class="space-y-4 max-h-[60vh] overflow-y-auto">
    ${nonValides.length?`<div><h3 class="text-sm font-bold text-red-600 mb-2"><i class="fas fa-times-circle mr-1"></i>À valider (${nonValides.length})</h3><div class="space-y-2">${nonValides.map(p=>`<button onclick="ouvrirValidationPoint(${rondeId},${p.id})" class="w-full p-3 bg-red-50 rounded-lg flex items-center gap-3 text-left hover:bg-red-100"><i class="fas fa-circle text-red-400 text-xs"></i><div class="flex-1"><div class="font-medium text-sm">${p.nom}</div><div class="text-xs text-gray-500">${p.chemin||''}</div></div></button>`).join('')}</div></div>`:''}
    ${valides.length?`<div><h3 class="text-sm font-bold text-green-600 mb-2"><i class="fas fa-check-circle mr-1"></i>Validés (${valides.length})</h3><div class="space-y-2">${valides.map(p=>{const a=r.anomalies?.find(x=>x.pointId===p.id);const c=a?(a.horsService?'red':'orange'):'green';return `<div class="p-3 bg-${c}-50 rounded-lg flex items-center gap-3"><i class="fas fa-${a?.horsService?'ban':a?'exclamation-triangle':'check-circle'} text-${c}-500"></i><div class="flex-1"><div class="font-medium text-sm">${p.nom}</div><div class="text-xs text-gray-500">${formatTime(p.heureValidation)}</div></div></div>`;}).join('')}</div></div>`:''}
  </div>`,null,'Fermer');
}

function terminerRonde(rondeId) {
  const r=DB.rondes.find(x=>x.id===rondeId); if (!r) return;
  const pts=r.pointsControle.filter(p=>p.valide).length;
  const total=r.pointsControle.length;
  const hasHS=r.anomalies?.some(a=>a.horsService);
  const hasAno=r.anomalies?.length>0;
  const col=hasHS?'red':hasAno?'orange':pts===total?'green':'orange';
  showModal('Terminer la ronde',`<div class="space-y-4">
    <div class="bg-${col}-50 p-4 rounded-lg"><div class="font-bold text-${col}-700">${hasHS?'🚫 Matériel(s) Hors Service':hasAno?'⚠️ Anomalies signalées':pts===total?'✅ Tous les points validés':`⚠️ ${total-pts} point(s) non validé(s)`}</div><div class="text-sm mt-1">${pts}/${total} points contrôlés</div></div>
    ${hasHS?`<div class="bg-red-100 p-4 rounded-lg"><div class="font-bold text-red-700 mb-2">Matériels HS :</div><ul class="text-sm text-red-600">${r.anomalies.filter(a=>a.horsService).map(a=>`<li>• ${a.pointNom}</li>`).join('')}</ul></div>`:''}
    <div><label class="block text-sm font-semibold mb-2">Observation (optionnel)</label><textarea id="obsFin" class="input" rows="3" placeholder="Commentaire de fin..."></textarea></div>
  </div>`,()=>{
    r.heureFin=new Date().toISOString(); r.observationFin=document.getElementById('obsFin').value;
    const duree=Math.round((new Date(r.heureFin)-new Date(r.heureDebut))/60000);
    const statut=hasHS?'🔴 HS':hasAno?'🟠':'🟢 OK';
    addMainCourante('Fin Ronde',`${statut} ${r.nom} (${pts}/${total}, ${duree}min)`,r.agentId);
    sauvegarderVersSupabase(); closeModal(); showToast('✅ Ronde terminée'); navigate('rondes');
  });
}

function renderMainCourante() {
  let entrees = DB.mainCourante.filter(m=>{
    const matchTexte=!filtresMainCourante.texte||m.description.toLowerCase().includes(filtresMainCourante.texte.toLowerCase())||m.type.toLowerCase().includes(filtresMainCourante.texte.toLowerCase());
    const matchType=!filtresMainCourante.type||m.type===filtresMainCourante.type;
    let matchDate=true;
    if (filtresMainCourante.dateDebut) matchDate=new Date(m.date)>=new Date(filtresMainCourante.dateDebut);
    if (filtresMainCourante.dateFin&&matchDate) matchDate=new Date(m.date)<=new Date(filtresMainCourante.dateFin+'T23:59:59');
    return matchTexte&&matchType&&matchDate;
  });
  const types=[...new Set(DB.mainCourante.map(m=>m.type))];
  return `
    <div class="flex flex-wrap items-center justify-between gap-4 mb-6"><h1 class="text-2xl font-bold text-gray-800"><i class="fas fa-clipboard-list mr-2 text-indigo-500"></i>Main Courante</h1><button onclick="window.print()" class="btn btn-primary no-print"><i class="fas fa-print mr-2"></i>Imprimer</button></div>
    <div class="search-filters no-print">
      <input type="text" class="input" placeholder="🔍 Rechercher..." value="${filtresMainCourante.texte}" onchange="filtresMainCourante.texte=this.value;navigate('mainCourante')">
      <select class="input" onchange="filtresMainCourante.type=this.value;navigate('mainCourante')"><option value="">Tous types</option>${types.map(t=>`<option value="${t}" ${filtresMainCourante.type===t?'selected':''}>${t}</option>`).join('')}</select>
      <input type="date" class="input" value="${filtresMainCourante.dateDebut}" onchange="filtresMainCourante.dateDebut=this.value;navigate('mainCourante')">
      <input type="date" class="input" value="${filtresMainCourante.dateFin}" onchange="filtresMainCourante.dateFin=this.value;navigate('mainCourante')">
      <button onclick="filtresMainCourante={texte:'',type:'',dateDebut:'',dateFin:''};navigate('mainCourante')" class="btn btn-secondary btn-sm"><i class="fas fa-times"></i></button>
    </div>
    <div class="card">
      <div class="gradient-header text-white p-4 font-semibold">Événements (${entrees.length})</div>
      <div class="overflow-x-auto"><table class="table"><thead><tr><th>Date/Heure</th><th>Type</th><th>Description</th><th>Agent</th></tr></thead><tbody>
        ${entrees.length?entrees.slice(0,100).map(m=>`<tr><td class="whitespace-nowrap">${formatDateTime(m.date)}</td><td><span class="badge ${getMainCouranteBadgeClass(m.type)}">${m.type}</span></td><td>${m.description}</td><td>${m.agent}</td></tr>`).join(''):'<tr><td colspan="4" class="text-center py-8 text-gray-500">Aucun événement</td></tr>'}
      </tbody></table></div>
    </div>`;
}

      <div><label class="block text-sm font-semibold mb-2">Agent *</label><select id="evtAgent" class="input">${agentsPoste.length?agentsPoste.map(a=>`<option value="${a.id}">${a.prenom} ${a.nom}</option>`).join(''):`<option value="${currentUser?.id}">${currentUser?.prenom} ${currentUser?.nom}</option>`}</select></div>
    </div>
    <div><label class="block text-sm font-semibold mb-2">Localisation *</label><select id="evtLocSelect" class="input mb-2" onchange="document.getElementById('evtLocAutre').classList.toggle('hidden',this.value!=='__autre__')">${locOptions}</select><input type="text" id="evtLocAutre" class="input hidden" placeholder="Précisez..."></div>
    <div><label class="block text-sm font-semibold mb-2">Description *</label><textarea id="evtDesc" class="input" rows="4" placeholder="Décrivez l'événement..."></textarea></div>
    <div class="bg-red-50 p-3 rounded-lg text-sm text-red-700"><i class="fas fa-exclamation-circle mr-1"></i>Statut initial : <strong>Début (alerte rouge)</strong></div>
  </div>`,()=>{
    const type=document.getElementById('evtType').value;
    const agentId=document.getElementById('evtAgent').value;
    const locSelect=document.getElementById('evtLocSelect').value;
    const localisation=locSelect==='__autre__'?document.getElementById('evtLocAutre').value.trim():locSelect;

function modifierStatutEvenement(id) {
  const e=DB.evenements.find(x=>x.id===id); if (!e) return;
  showModal('Modifier le statut',`<div class="space-y-4">
    <div class="bg-gray-50 p-3 rounded-lg"><div class="font-semibold">${e.type}</div><div class="text-sm text-gray-500">${e.localisation||''}</div></div>
    <div><label class="block text-sm font-semibold mb-2">Nouveau statut</label><select id="evtNewStatut" class="input" onchange="toggleEvtFields()"><option value="Début" ${e.statut==='Début'?'selected':''}>🔴 Début</option><option value="En cours" ${e.statut==='En cours'?'selected':''}>🟠 En cours</option><option value="Terminé" ${e.statut==='Terminé'?'selected':''}>🟢 Terminé</option></select></div>
    <div id="commentSection" class="${e.statut==='En cours'?'':'hidden'}"><label class="block text-sm font-semibold mb-2">Commentaire</label><textarea id="evtComment" class="input" rows="3">${e.commentaire||''}</textarea></div>
    <div id="crSection" class="${e.statut==='Terminé'?'':'hidden'}"><label class="block text-sm font-semibold mb-2">Compte-rendu final *</label><textarea id="evtCR" class="input" rows="4">${e.compteRendu||''}</textarea></div>
  </div>`,()=>{

function toggleEvtFields() {

function showModalMateriel() {

async function importerFormateurs() {
  showToast('Importation en cours...','info');
  const { data: formateurs } = await supabase.from('formateurs').select('id, nom, prenom, pin_hash, pin_clair, email, telephone').eq('center_id', currentCenter.id).eq('actif', true);
  if (!formateurs?.length) { showToast('Aucun formateur trouvé pour ce centre','warning'); return; }
  let added=0;
  for (const f of formateurs) {
    if (!DB.agents.find(a => String(a.id) === String(f.id))) {
      // Utiliser pin_hash si dispo, sinon hasher pin_clair
      let pinHash = f.pin_hash || null;
      if (!pinHash && f.pin_clair) { pinHash = await UTILS.hash(f.pin_clair); }
      DB.agents.push({ id:f.id, nom:f.nom, prenom:f.prenom, qualification:'SSIAP 2', entreprise:currentCenter?.nom||'', email:f.email||'', telephone:f.telephone||'', pinHash, pinClair:f.pin_clair||null, actif:true, type:'formateur', dateDebutContrat:new Date().toISOString().split('T')[0] });
      added++;
    }
  }
  if (added>0) { sauvegarderVersSupabase(); showToast(`✅ ${added} formateur(s) importé(s)`); navigate('agents'); }
  else showToast('Tous les formateurs sont déjà dans Patrol','info');
}

function buildAllPoints() {
  let pts=[];
  if (!filtresQRCodes.type||filtresQRCodes.type==='__zones__') {
    configEtablissement.batiments.forEach(bat=>{
      if (filtresQRCodes.batiment&&bat.id!==filtresQRCodes.batiment) return;
      bat.secteurs.forEach(sect=>{
        if (filtresQRCodes.secteur&&sect.id!==filtresQRCodes.secteur) return;
        sect.zones.forEach(zone=>{ const qr=`ZONE-${bat.id}-${sect.id}-${zone.toUpperCase().replace(/[^A-Z0-9]/g,'')}`; pts.push({type:'Zone',nom:zone,chemin:`${bat.nom} > ${sect.nom}`,qrCode:qr}); });
      });
    });
  }
  if (filtresQRCodes.type!=='__zones__') {
    DB.materiels.forEach(m=>{
      if (filtresQRCodes.type&&filtresQRCodes.type!=='__materiels__'&&m.type!==filtresQRCodes.type) return;
      pts.push({type:m.type,nom:m.nom,chemin:m.localisation||'',qrCode:m.codeQR||`MAT-${m.id}`});
    });
  }
  return pts;
}

function renderAdminQRCodes() {
  const batiments=configEtablissement.batiments;
  const typesM=[...new Set(DB.materiels.map(m=>m.type))];
  let secteursDisponibles=[];
  if (filtresQRCodes.batiment) { const bat=batiments.find(b=>b.id===filtresQRCodes.batiment); if (bat) secteursDisponibles=bat.secteurs; }
  const allPoints=buildAllPoints();

    <div class="flex items-center justify-between flex-wrap gap-4"><h2 class="text-lg font-bold"><i class="fas fa-qrcode mr-2"></i>QR Codes (${allPoints.length})</h2><button onclick="imprimerQRCodesFiltres()" class="btn btn-primary"><i class="fas fa-print mr-2"></i>Imprimer</button></div>
    <div class="bg-gray-50 p-4 rounded-xl space-y-3">

        <div><label class="block text-xs text-gray-500 mb-1">Type</label><select class="input" onchange="filtresQRCodes.type=this.value;navigate('administration')"><option value="">Zones + Matériels</option><option value="__zones__">Zones uniquement</option><option value="__materiels__">Tous les matériels</option>${typesM.map(t=>`<option value="${t}" ${filtresQRCodes.type===t?'selected':''}>${t}</option>`).join('')}</select></div>

    </div>
    <div class="qr-grid" id="qrCodesContainer">
      ${allPoints.slice(0,20).map((p,i)=>`<div class="qr-card"><div class="text-xs mb-2"><span class="badge ${p.type==='Zone'?'badge-info':'badge-warning'}">${p.type}</span></div><div id="qr-admin-${i}" class="mb-2 flex justify-center min-h-[80px]"></div><div class="font-semibold text-sm">${p.nom}</div><div class="text-xs text-gray-500 truncate">${p.chemin}</div><div class="text-xs text-gray-400 font-mono mt-1 truncate">${p.qrCode}</div></div>`).join('')||'<div class="col-span-full text-center py-8 text-gray-500">Aucun QR code</div>'}
    </div>
    ${allPoints.length>20?`<p class="text-center text-gray-500 text-sm">20 affichés sur ${allPoints.length}. Utilisez "Imprimer" pour tous les voir.</p>`:''}
  </div>`;
}

function genererQRCodesAdminFiltre(points) {
  if (typeof QRCode==='undefined'||!points) return;
  points.slice(0,20).forEach((p,i)=>{
    const container=document.getElementById(`qr-admin-${i}`);
    if (container&&p.qrCode) { container.innerHTML=''; try{new QRCode(container,{text:p.qrCode,width:80,height:80,colorDark:'#000000',colorLight:'#ffffff',correctLevel:QRCode.CorrectLevel.M});}catch(e){container.innerHTML=`<span class="text-gray-400 text-xs font-mono">${p.qrCode}</span>`;} }
  });
}

function imprimerQRCodesFiltres() {
  const allPoints=buildAllPoints();
  if (!allPoints.length){showToast('Aucun QR code à imprimer','warning');return;}
  const qrScripts=allPoints.map((p,i)=>`try{new QRCode(document.getElementById('qr${i}'),{text:'${p.qrCode}',width:60,height:60})}catch(e){}`).join(';');
  const pw=window.open('','_blank');
  pw.document.write(`<!DOCTYPE html><html><head><title>QR Codes — ${currentCenter?.nom}</title><script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"><\/script><style>body{font-family:Arial,sans-serif;padding:20px;font-size:11px}h1{text-align:center;color:#4f46e5;font-size:16px;margin-bottom:5px}.sub{text-align:center;color:#666;font-size:11px;margin-bottom:20px}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.card{border:1px solid #ccc;padding:10px;text-align:center;page-break-inside:avoid;border-radius:6px}.card h3{margin:6px 0 2px;font-size:10px}.card p{margin:0;font-size:8px;color:#666}.card .code{font-family:monospace;font-size:7px;color:#999;margin-top:3px;word-break:break-all}.badge{font-size:8px;padding:2px 5px;border-radius:8px;display:inline-block;margin-bottom:4px}.bz{background:#dbeafe;color:#1d4ed8}.bm{background:#fef3c7;color:#d97706}@media print{body{padding:5px}.grid{gap:8px}}<\/style></head><body><h1>🔒 QR Codes SSIAP Patrol</h1><p class="sub">${currentCenter?.nom} • ${allPoints.length} QR codes • ${new Date().toLocaleDateString('fr-FR')}</p><div class="grid">${allPoints.map((p,i)=>`<div class="card"><span class="badge ${p.type==='Zone'?'bz':'bm'}">${p.type}</span><div id="qr${i}"></div><h3>${p.nom}</h3><p>${p.chemin}</p><div class="code">${p.qrCode}</div></div>`).join('')}</div><script>${qrScripts};setTimeout(function(){window.print()},1500)<\/script></body></html>`);
}

function ajouterSecteur(batId){showModal('Nouveau Secteur','<div><label class="block text-sm font-semibold mb-2">Nom *</label><input type="text" id="sectNom" class="input" placeholder="Ex: 3ème étage"></div>',()=>{const nom=document.getElementById('sectNom').value.trim();if(!nom){showToast('Nom requis','error');return;}const bat=configEtablissement.batiments.find(b=>b.id===batId);if(bat){bat.secteurs.push({id:batId+'-'+nom.toLowerCase().replace(/[^a-z0-9]/g,'-'),nom,zones:[]});sauvegarderVersSupabase();}closeModal();showToast('✅ Secteur ajouté');navigate('administration');});}
function supprimerSecteur(batId,sectId){showConfirm('Supprimer ce secteur ?',()=>{const bat=configEtablissement.batiments.find(b=>b.id===batId);if(bat){bat.secteurs=bat.secteurs.filter(s=>s.id!==sectId);sauvegarderVersSupabase();}closeModal();showToast('🗑️ Secteur supprimé');navigate('administration');});}
function ajouterZone(batId,sectId){showModal('Nouvelle Zone','<div><label class="block text-sm font-semibold mb-2">Nom *</label><input type="text" id="zoneNom" class="input"></div>',()=>{const nom=document.getElementById('zoneNom').value.trim();if(!nom){showToast('Nom requis','error');return;}const bat=configEtablissement.batiments.find(b=>b.id===batId);const sect=bat?.secteurs.find(s=>s.id===sectId);if(sect){if(sect.zones.includes(nom)){showToast('Zone existante','error');return;}sect.zones.push(nom);sauvegarderVersSupabase();}closeModal();showToast('✅ Zone ajoutée');navigate('administration');});}

function exporterDonnees(){const data={version:'3.0',date:new Date().toISOString(),centre:currentCenter?.nom,agents:DB.agents,materiels:DB.materiels,prisesPoste:DB.prisesPoste,rondes:DB.rondes,evenements:DB.evenements,mainCourante:DB.mainCourante,consignes:DB.consignes,configEtablissement,typesRondes};const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`ssiap-patrol-${currentCenter?.nom?.replace(/\s/g,'-')}-${new Date().toISOString().split('T')[0]}.json`;document.body.appendChild(a);a.click();document.body.removeChild(a);showToast('💾 Données exportées');}
function importerDonnees(){const input=document.createElement('input');input.type='file';input.accept='.json';input.onchange=e=>{const file=e.target.files[0];if(!file)return;const reader=new FileReader();reader.onload=event=>{try{const data=JSON.parse(event.target.result);if(data.agents)DB.agents=data.agents;if(data.materiels)DB.materiels=data.materiels;if(data.prisesPoste)DB.prisesPoste=data.prisesPoste;if(data.rondes)DB.rondes=data.rondes;if(data.evenements)DB.evenements=data.evenements;if(data.mainCourante)DB.mainCourante=data.mainCourante;if(data.consignes)DB.consignes=data.consignes;if(data.configEtablissement)configEtablissement=data.configEtablissement;if(data.typesRondes)typesRondes=data.typesRondes;sauvegarderVersSupabase();showToast('✅ Données importées');navigate(currentView);}catch(err){showToast('❌ Fichier invalide','error');}};reader.readAsText(file);};input.click();}
function reinitialiserOperationnel(){showConfirm('⚠️ Supprimer toutes les rondes, événements et la main courante ?',()=>{DB.prisesPoste=[];DB.rondes=[];DB.evenements=[];DB.mainCourante=[];sauvegarderVersSupabase();closeModal();showToast('🗑️ Réinitialisé');navigate('administration');});}

// MODALS & TOASTS
// ══════════════════════════════════════════

function showModal(title, content, onConfirm, confirmText='Confirmer') {
  modalConfirmCallback=onConfirm;
  document.getElementById('modalContainer').innerHTML=`<div class="modal-overlay" onclick="if(event.target===this)closeModal()"><div class="modal-content"><div class="modal-header"><h2 class="text-xl font-bold text-gray-800">${title}</h2></div><div class="modal-body">${content}</div><div class="modal-footer"><button onclick="closeModal()" class="btn btn-secondary">Annuler</button>${onConfirm?`<button onclick="modalConfirmCallback?.()" class="btn btn-primary">${confirmText}</button>`:''}</div></div></div>`;
}
function closeModal(){document.getElementById('modalContainer').innerHTML='';modalConfirmCallback=null;arreterScanQR();}
function showConfirm(message,onConfirm){showModal('Confirmation',`<p class="text-gray-600 whitespace-pre-line">${message}</p>`,onConfirm,'Confirmer');}

function showToast(message, type='success') {
  const colors={success:'bg-green-500',error:'bg-red-500',warning:'bg-orange-500',info:'bg-blue-500'};
  const toast=document.createElement('div');
  toast.className=`fixed top-20 left-1/2 transform -translate-x-1/2 ${colors[type]} text-white px-6 py-3 rounded-xl shadow-lg z-[200] fade-in`;
  toast.innerHTML=`<span>${message}</span>`; document.body.appendChild(toast);
  setTimeout(()=>{toast.style.opacity='0';toast.style.transition='opacity .3s';setTimeout(()=>toast.remove(),300);},3000);
}
